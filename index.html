<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F2F2F7;
  --surface: #FFFFFF;
  --surface2: #F2F2F7;
  --card: #FFFFFF;
  --label: #0A0A0F;
  --label2: #3A3A4A;
  --label3: rgba(10,10,15,0.42);
  --label4: rgba(10,10,15,0.12);
  --sep: rgba(10,10,15,0.08);
  --accent: #1A3A6B;
  --accent-mid: #1E4D96;
  --accent-light: #2563C0;
  --green: #1A8C4E;
  --green-bg: #E8F5EE;
  --red: #C0392B;
  --orange: #C05C00;
  --radius: 16px;
  --radius-sm: 10px;
  --track: #1A3A6B;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #08080F;
    --surface: #111118;
    --surface2: #18181F;
    --card: #16161E;
    --label: #F0F0F8;
    --label2: rgba(240,240,248,0.72);
    --label3: rgba(240,240,248,0.38);
    --label4: rgba(240,240,248,0.13);
    --sep: rgba(240,240,248,0.07);
    --accent: #2563C0;
    --accent-mid: #3070D0;
    --accent-light: #4A85E8;
    --green: #1DB954;
    --green-bg: rgba(29,185,84,0.1);
    --red: #E5534B;
    --orange: #E07820;
    --track: #2563C0;
  }
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--label);
  font-size: 16px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV BAR ── */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--accent);
  padding: 0 20px;
  padding-top: env(safe-area-inset-top, 0px);
  min-height: calc(env(safe-area-inset-top, 0px) + 58px);
  display: flex;
  align-items: center;
  justify-content: center;
  /* subtle rail texture via repeating gradient */
  background-image: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 39px,
    rgba(255,255,255,0.025) 39px,
    rgba(255,255,255,0.025) 40px
  );
}

.nav-home {
  position: absolute;
  left: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 7px;
  cursor: pointer;
  border-radius: 10px;
  transition: background 0.15s, opacity 0.15s;
}
.nav-home:active { background: rgba(255,255,255,0.2); opacity: 0.7; }

.nav-center { display: flex; flex-direction: column; align-items: center; gap: 1px; }

.nav-title {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 0.04em;
}

.nav-subtitle {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
}

.nav-time {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  position: absolute;
  right: 20px;
  letter-spacing: 0.04em;
}

/* ── CONTENT ── */
.content {
  padding: 18px 16px;
  padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 24px);
  max-width: 480px;
  margin: 0 auto;
}

/* ── SECTION LABEL ── */
.section-header {
  font-size: 10px;
  font-weight: 600;
  color: var(--label3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin: 0 4px 8px;
}

/* ── STATION PICKER CARD ── */
.picker-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: visible;
  margin-bottom: 16px;
  box-shadow: 0 1px 0 var(--sep), 0 2px 12px rgba(0,0,0,0.05);
  position: relative;
}

.picker-row {
  display: flex;
  align-items: center;
  padding: 0 16px;
  min-height: 56px;
  gap: 12px;
  border-bottom: 1px solid var(--sep);
}
.picker-row:last-child { border-bottom: none; }

.picker-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.picker-icon.from { background: rgba(37,99,192,0.1); }
.picker-icon.to   { background: rgba(26,140,78,0.1); }

.picker-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.picker-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--label3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

select {
  width: 100%;
  background: transparent;
  border: none;
  padding: 0;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  color: var(--label);
  appearance: none;
  outline: none;
  cursor: pointer;
}
select option { color: var(--label); background: var(--surface); }

.picker-chevron {
  color: var(--label4);
  flex-shrink: 0;
}

/* ── SWAP BUTTON ── */
.swap-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--sep);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.25s;
  z-index: 10;
}
.swap-btn:active { background: var(--sep); }
.swap-btn.spinning { transform: translateY(-50%) rotate(180deg); }

/* ── BANNERS ── */
.banner {
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 14px;
  display: none;
  letter-spacing: -0.1px;
  border-left: 3px solid;
}
.banner.visible { display: flex; align-items: center; gap: 8px; }
.banner-holiday { background: rgba(192,92,0,0.07); color: var(--orange); border-color: var(--orange); }
.banner-noservice { background: rgba(192,57,43,0.07); color: var(--red); border-color: var(--red); }

/* ── NEXT DEPARTURE CARD ── */
.next-card {
  background: var(--accent);
  border-radius: var(--radius);
  padding: 20px 20px 18px;
  margin-bottom: 16px;
  display: none;
  box-shadow: 0 4px 20px rgba(26,58,107,0.3);
  position: relative;
  overflow: hidden;
}
.next-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 160px; height: 160px;
  background: radial-gradient(circle at 100% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
/* decorative track lines */
.next-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.15) 0px,
    rgba(255,255,255,0.15) 20px,
    transparent 20px,
    transparent 30px
  );
}
.next-card.visible { display: block; }

.next-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.next-eyebrow::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4AE87A;
  box-shadow: 0 0 0 3px rgba(74,232,122,0.25);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(74,232,122,0.25); }
  50% { box-shadow: 0 0 0 6px rgba(74,232,122,0.1); }
}

.next-main {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 16px;
}

.next-dep-time {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 300;
  color: #fff;
  line-height: 1;
  letter-spacing: -2px;
}

.next-route {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.next-right {
  text-align: right;
  padding-bottom: 4px;
}

.next-countdown {
  font-family: var(--mono);
  font-size: 42px;
  font-weight: 300;
  color: #fff;
  line-height: 1;
  letter-spacing: -1px;
}

.next-countdown-label {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.next-divider {
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin: 0 0 14px;
}

.next-arr-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.next-arr-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
}

.next-arr-time {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.9);
}

.next-train-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  font-weight: 400;
  letter-spacing: 0.06em;
}

/* ── SHORT LINE BADGE ── */
.short-badge {
  display: inline-block;
  background: rgba(224,120,32,0.12);
  color: var(--orange);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  vertical-align: middle;
  margin-left: 4px;
}

/* ── DEPARTURE LIST ── */
.dep-list-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 1px 0 var(--sep), 0 2px 12px rgba(0,0,0,0.04);
}

.dep-row {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--sep);
  transition: background 0.1s;
}
.dep-row:last-child { border-bottom: none; }
.dep-row.is-next { background: rgba(37,99,192,0.04); }

.dep-row-main {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 14px;
}

/* station line dot */
.dep-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  width: 16px;
}
.dep-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--label4);
  border: 2px solid var(--label4);
  flex-shrink: 0;
}
.dep-dot.upcoming {
  background: var(--accent-light);
  border-color: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(37,99,192,0.15);
}
.dep-dot.past {
  background: transparent;
  border-color: var(--label4);
  opacity: 0.4;
}

.dep-times { flex: 1; min-width: 0; }

.dep-dep {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 400;
  color: var(--label);
  letter-spacing: -0.3px;
}
.dep-row.past-train .dep-dep {
  color: var(--label3);
}

.dep-arr {
  font-size: 12px;
  color: var(--label3);
  margin-top: 1px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.1px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

.dep-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.dep-train {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--label3);
  background: var(--surface2);
  border-radius: 5px;
  padding: 2px 7px;
  letter-spacing: 0.04em;
}

.dep-min-away {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-light);
  letter-spacing: -0.2px;
}

/* ── ROUTE DIAGRAM (intermediate stops) ── */
.dep-route-diagram {
  display: flex;
  flex-direction: column;
  padding: 0 16px 12px 42px;
}

.dep-route-stop {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dep-route-node-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  width: 7px;
}

.route-node {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  border: 1.5px solid var(--accent-light);
  background: transparent;
  flex-shrink: 0;
}
.route-node.endpoint { background: var(--accent-light); }

.route-seg {
  width: 1.5px;
  height: 7px;
  background: var(--sep);
  flex-shrink: 0;
}

.route-seg-spacer {
  height: 7px;
  flex-shrink: 0;
}

.dep-route-stop-name {
  font-size: 10.5px;
  color: var(--label3);
  font-weight: 500;
  line-height: 1.4;
  letter-spacing: -0.1px;
  padding: 3px 0;
}
.dep-route-stop-name.endpoint {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--label2);
}

.dep-route-stop-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--label3);
  margin-left: auto;
  padding-left: 10px;
}
.dep-route-stop-time.endpoint {
  font-size: 11px;
  color: var(--label2);
  font-weight: 500;
}

/* ── PAST TRAINS TOGGLE ── */
.past-toggle {
  text-align: center;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-light);
  letter-spacing: 0.02em;
  cursor: pointer;
  border-top: 1px solid var(--sep);
  transition: background 0.1s;
}
.past-toggle:active { background: var(--surface2); }

/* ── TOMORROW CARD ── */
.tomorrow-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: 0 1px 0 var(--sep), 0 2px 12px rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  gap: 12px;
}
.tomorrow-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: rgba(26,58,107,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.tomorrow-text {}
.tomorrow-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--label3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 2px;
}
.tomorrow-time {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 400;
  color: var(--label);
  letter-spacing: -0.3px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 56px 24px;
  color: var(--label3);
}
.empty-icon-wrap {
  margin-bottom: 18px;
  display: flex;
  justify-content: center;
}
.empty-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--label2);
  margin-bottom: 8px;
  letter-spacing: -0.4px;
}
.empty-sub {
  font-size: 14px;
  line-height: 1.6;
  color: var(--label3);
  max-width: 260px;
  margin: 0 auto;
}
.empty-credit {
  font-size: 11px;
  font-weight: 500;
  color: var(--label4);
  margin-top: 28px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: var(--mono);
}

.no-more {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: var(--label3);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── TRAIN ICON SVG ── */
.train-svg-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

/* ── ANIMATIONS ── */
.next-card.visible { animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.dep-list-card { animation: fadeIn 0.25s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="nav-bar">
  <button class="nav-home" onclick="resetToHome()" aria-label="Почетна страница">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M3 10.5L12 3L21 10.5V20C21 20.5523 20.5523 21 20 21H15V15H9V21H4C3.44772 21 3 20.5523 3 20V10.5Z"
        stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
    </svg>
  </button>
  <div class="nav-center">
    <div class="nav-title">БГ:воз</div>
    <div class="nav-subtitle">ред вожње</div>
  </div>
  <div class="nav-time" id="clock">--:--</div>
</div>

<div class="content">

  <!-- STATION PICKER -->
  <div class="picker-card">
    <div class="picker-row">
      <div class="picker-icon from">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="5" stroke="#2563C0" stroke-width="1.8"/>
          <circle cx="8" cy="8" r="2" fill="#2563C0"/>
        </svg>
      </div>
      <div class="picker-text">
        <div class="picker-label">Полазак</div>

// ─── HELPERS ───────────────────────────────────────────────────────────────
function toMin(t) {
  if (!t) return null;
  const [h, m] = t.split('.').map(Number);
  return h * 60 + m;
}

function fmt(t) {
  if (!t) return '—';
  const [h, m] = t.split('.').map(Number);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function todayISO() { return new Date().toISOString().slice(0,10); }
function isNoServiceDay(date) {
  const d = date || new Date();
  const day = d.getDay(); // 0=Sun, 6=Sat
  if (day === 0 || day === 6) return true;
  return HOLIDAYS.has(d.toISOString().slice(0,10));
}
function isHoliday() { return HOLIDAYS.has(todayISO()); } // kept for banner only
function nowMin() { const n = new Date(); return n.getHours()*60+n.getMinutes(); }

function isShortTrain(tr, to) {
  return tr.t[to] === null || tr.t[to] === undefined;
}

// ─── STATION LISTS ─────────────────────────────────────────────────────────
function populateDropdowns() {
  const f = document.getElementById('fromStation');
  const t = document.getElementById('toStation');
  // restore from URL hash or localStorage
  const saved = getSaved();
  ALL_UNIQUE.forEach(s => {
    const oF = document.createElement('option');
    oF.value = oF.textContent = s;
    if (saved.from === s) oF.selected = true;
    f.appendChild(oF);

    const oT = document.createElement('option');
    oT.value = oT.textContent = s;
    if (saved.to === s) oT.selected = true;
    t.appendChild(oT);
  });
}

function swapStations() {
  const f = document.getElementById('fromStation');
  const t = document.getElementById('toStation');
  [f.value, t.value] = [t.value, f.value];
  const btn = document.getElementById('swapBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 300);
  render();
}

// ─── DIRECTION DETECTION ───────────────────────────────────────────────────
function detectDirection(from, to) {
  const iAf = STATIONS_A.indexOf(from), iAt = STATIONS_A.indexOf(to);
  if (iAf !== -1 && iAt !== -1 && iAf < iAt) return 'A';
  const iBf = STATIONS_B.indexOf(from), iBt = STATIONS_B.indexOf(to);
  if (iBf !== -1 && iBt !== -1 && iBf < iBt) return 'B';
  return null;
}

function getTrains(dir, from, to, noService) {
  const pool = dir === 'A' ? TRAINS_A : TRAINS_B;
  return pool.filter(tr => {
    // hol:true    = special holiday-only train (8340)
    // hol:false = only runs Mon–Fri, not on weekends or holidays
    // hol:false   = runs every day including weekends
    if (tr.hol === true && !noService) return false;   // holiday train, not a holiday → skip
    if (tr.hol === true && noService) return true;     // holiday train, is holiday → include (but check times below)
    if (tr.hol === 'weekday' && noService) return false; // weekday train, weekend/holiday → skip
    // hol:false and hol:false on a weekday → always include
    const depT = tr.t[from];
    const arrT = tr.t[to];
    if (!depT) return false;
    if (!arrT) return false;
    return toMin(arrT) > toMin(depT);
  });
}

// Find first train on the next working day (used when no more trains today)
function firstTomorrow(dir, from, to) {
  const pool = dir === 'A' ? TRAINS_A : TRAINS_B;
  for (let offset = 1; offset <= 7; offset++) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    d.setHours(0,0,0,0);
    const ns = isNoServiceDay(d);
    for (const tr of pool) {
      if (tr.hol === true && !ns) continue;
      if (tr.hol === true && ns) { /* include */ }
      else if (tr.hol === 'weekday' && ns) continue;
      if (!tr.t[from] || !tr.t[to]) continue;
      if (toMin(tr.t[to]) > toMin(tr.t[from])) {
        const dayNames = ['недеља','понедељак','уторак','среда','четвртак','петак','субота'];
        return { tr, dayLabel: offset === 1 ? 'сутра' : dayNames[d.getDay()] };
      }
    }
  }
  return null;
}

// ─── PERSISTENCE ───────────────────────────────────────────────────────────
function getSaved() {
  try {
    const h = location.hash.slice(1);
    if (h) {
      const p = new URLSearchParams(h);
      return { from: p.get('od') || '', to: p.get('do') || '' };
    }
    const raw = localStorage.getItem('bgvoz_route');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { from: '', to: '' };
}

function saveRoute(from, to) {
  try {
    localStorage.setItem('bgvoz_route', JSON.stringify({from, to}));
    if (from && to) {
      const p = new URLSearchParams();
      p.set('od', from); p.set('do', to);
      history.replaceState(null, '', '#' + p.toString());
    } else {
      history.replaceState(null, '', location.pathname);
    }
  } catch(e) {}
}

// ─── CLOCK ─────────────────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}

// ─── INTERMEDIATE STOPS ────────────────────────────────────────────────────
function getIntermediateStops(dir, from, to) {
  const stations = dir === 'A' ? STATIONS_A : STATIONS_B;
  const iFrom = stations.indexOf(from);
  const iTo   = stations.indexOf(to);
  if (iFrom === -1 || iTo === -1 || iTo <= iFrom + 1) return [];
  return stations.slice(iFrom + 1, iTo);
}

function renderRouteDiagram(tr, from, to, midStops) {
  const allStops = [from, ...midStops.filter(s => tr.t[s] != null), to];
  let html = '';
  allStops.forEach((s, i) => {
    const isFirst    = i === 0;
    const isLast     = i === allStops.length - 1;
    const isEndpoint = isFirst || isLast;
    const t = tr.t[s];
    html += `<div class="dep-route-stop">
      <div class="dep-route-node-col">
        ${!isFirst ? '<div class="route-seg"></div>' : '<div class="route-seg-spacer"></div>'}
        <div class="route-node${isEndpoint ? ' endpoint' : ''}"></div>
        ${!isLast ? '<div class="route-seg"></div>' : '<div class="route-seg-spacer"></div>'}
      </div>
      <span class="dep-route-stop-name${isEndpoint ? ' endpoint' : ''}">${s}</span>
      <span class="dep-route-stop-time${isEndpoint ? ' endpoint' : ''}">${fmt(t)}</span>
    </div>`;
  });
  return `<div class="dep-route-diagram">${html}</div>`;
}

// ─── RENDER ────────────────────────────────────────────────────────────────
let cdTimer = null;

function render() {
  const from = document.getElementById('fromStation').value;
  const to   = document.getElementById('toStation').value;
  const res  = document.getElementById('results');
  const nosB = document.getElementById('noServiceBanner');

  nosB.classList.remove('visible');
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }

  saveRoute(from, to);

  if (!from || !to) {
    res.innerHTML = homeScreen();
    return;
  }
  if (from === to) {
    res.innerHTML = emptyState('↩', 'Иста станица', 'Полазна и одредишна станица не смеју бити исте.');
    return;
  }

  const dir = detectDirection(from, to);
  if (!dir) {
    res.innerHTML = emptyState('🔄', 'Неважећи смер', 'За овај смер нема директне линије. Замените станице.');
    return;
  }

  const holiday = isHoliday();
  const noService = isNoServiceDay();
  const trains = getTrains(dir, from, to, noService);

  if (!trains.length) {
    nosB.classList.add('visible');
    res.innerHTML = emptyState('⛔', 'Нема возова', 'Нема возова за овај правац данас.');
    return;
  }

  const nm = nowMin();
  const dirLabel = dir === 'A' ? 'Овча → Батајница' : 'Батајница → Овча';
  const future = trains.filter(tr => toMin(tr.t[from]) >= nm);
  const next   = future[0] || null;

  let html = '';

  // ── NEXT CARD ──
  if (next) {
    const dep = next.t[from];
    const arr = next.t[to];
    const diff = toMin(dep) - nm;
    const isShort = !arr;
    html += `
    <div class="next-card visible">
      <div class="next-eyebrow">${from}</div>
      <div class="next-main">
        <div class="next-left">
          <div class="next-dep-time">${fmt(dep)}</div>
          <div class="next-route">${dirLabel}</div>
        </div>
        <div class="next-right">
          <div class="next-countdown" id="cdNum">${Math.max(0,diff)}</div>
          <div class="next-countdown-label">мин. до поласка</div>
        </div>
      </div>
      <div class="next-divider"></div>
      <div class="next-arr-row">
        <span class="next-arr-label">${to}</span>
        <span class="next-arr-time">${fmt(arr)}</span>
        <span class="next-train-badge">${next.id}</span>
      </div>
    </div>`;
  }

  // ── NO MORE + TOMORROW ──
  if (!future.length) {
    const tom = firstTomorrow(dir, from, to);
    if (tom) {
      html += `
      <div class="tomorrow-card">
        <div class="tomorrow-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="5" width="18" height="16" rx="2.5" stroke="var(--accent)" stroke-width="1.6"/>
            <path d="M8 3V7M16 3V7" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M3 10H21" stroke="var(--accent)" stroke-width="1.6"/>
          </svg>
        </div>
        <div class="tomorrow-text">
          <div class="tomorrow-label">${tom.dayLabel} · Први воз</div>
          <div class="tomorrow-time">${fmt(tom.tr.t[from])} → ${fmt(tom.tr.t[to])}</div>
        </div>
      </div>`;
    }
    html += `<div class="no-more">Нема више полазака данас</div>`;
  }

  // ── UPCOMING LIST ──
  if (future.length) {
    const midStops = getIntermediateStops(dir, from, to);
    html += `<div class="section-header" style="margin-top:4px">Предстојећи поласци</div>
    <div class="dep-list-card">`;
    future.forEach((tr, i) => {
      const dep = tr.t[from];
      const arr = tr.t[to];
      if (!arr) return;
      const isNext = i === 0;
      const minsAway = toMin(dep) - nm;
      html += `<div class="dep-row ${isNext ? 'is-next' : ''}">
        <div class="dep-row-main">
          <div class="dep-track">
            <div class="dep-dot ${isNext ? 'upcoming' : ''}"></div>
          </div>
          <div class="dep-times">
            <div class="dep-dep">${fmt(dep)}</div>
            <div class="dep-arr">→ ${to} у ${fmt(arr)}</div>
          </div>
          <div class="dep-right">
            <div class="dep-train">${tr.id}</div>
            ${isNext ? `<div class="dep-min-away">${minsAway} мин.</div>` : ''}
          </div>
        </div>
        ${renderRouteDiagram(tr, from, to, midStops)}
      </div>`;
    });
    html += `</div>`;
  }

  res.innerHTML = html;

  // countdown
  if (next) {
    function updateCd() {
      const d = toMin(next.t[from]) - nowMin();
      const el = document.getElementById('cdNum');
      if (el) el.textContent = Math.max(0, d);
    }
    updateCd();
    cdTimer = setInterval(updateCd, 30000);
  }
}

// ─── SERVICE WORKER (PWA offline support) ─────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'bgvoz-v1';
    const FONTS = [
      'https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..500;9..600;9..700&display=swap'
    ];
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(FONTS).catch(() => {}))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          if (e.request.url.includes('fonts')) {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
