<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F2F2F7;
  --surface: #FFFFFF;
  --surface2: #F2F2F7;
  --card: #FFFFFF;
  --label: #0A0A0F;
  --label2: #3A3A4A;
  --label3: rgba(10,10,15,0.42);
  --label4: rgba(10,10,15,0.12);
  --sep: rgba(10,10,15,0.08);
  --accent: #1A3A6B;
  --accent-mid: #1E4D96;
  --accent-light: #2563C0;
  --green: #1A8C4E;
  --green-bg: #E8F5EE;
  --red: #C0392B;
  --orange: #C05C00;
  --radius: 16px;
  --radius-sm: 10px;
  --track: #1A3A6B;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #08080F;
    --surface: #111118;
    --surface2: #18181F;
    --card: #16161E;
    --label: #F0F0F8;
    --label2: rgba(240,240,248,0.72);
    --label3: rgba(240,240,248,0.38);
    --label4: rgba(240,240,248,0.13);
    --sep: rgba(240,240,248,0.07);
    --accent: #2563C0;
    --accent-mid: #3070D0;
    --accent-light: #4A85E8;
    --green: #1DB954;
    --green-bg: rgba(29,185,84,0.1);
    --red: #E5534B;
    --orange: #E07820;
    --track: #2563C0;
  }
}

html, body {
  height: 100%;
  font-family: var(--sans);
  background: var(--bg);
  color: var(--label);
  font-size: 16px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV BAR ── */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--accent);
  padding: 0 20px;
  padding-top: env(safe-area-inset-top, 0px);
  min-height: calc(env(safe-area-inset-top, 0px) + 58px);
  display: flex;
  align-items: center;
  justify-content: center;
  /* subtle rail texture via repeating gradient */
  background-image: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 39px,
    rgba(255,255,255,0.025) 39px,
    rgba(255,255,255,0.025) 40px
  );
}

.nav-info-btn {
  position: absolute;
  left: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 7px;
  cursor: pointer;
  border-radius: 10px;
  transition: background 0.15s, opacity 0.15s;
  opacity: 0;
  pointer-events: none;
}
.nav-info-btn.visible { opacity: 1; pointer-events: auto; }
.nav-info-btn:active { background: rgba(255,255,255,0.2); }

/* home info block */
.home-info {
  margin-top: 8px;
  padding: 12px 4px 0;
}
.home-info-text {
  font-size: 13px;
  color: var(--label3);
  line-height: 1.6;
  text-align: center;
}

.nav-center { display: flex; flex-direction: column; align-items: center; gap: 1px; }

.nav-title {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 0.04em;
}

.nav-subtitle {
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.06em;
}

.nav-time {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.8);
  position: absolute;
  right: 20px;
  letter-spacing: 0.04em;
}

/* ── CONTENT ── */
.content {
  padding: 18px 16px;
  padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 24px);
  max-width: 480px;
  margin: 0 auto;
}

/* ── SECTION LABEL ── */
.section-header {
  font-size: 10px;
  font-weight: 600;
  color: var(--label3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin: 0 4px 8px;
}

/* ── STATION PICKER CARD ── */
.picker-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: visible;
  margin-bottom: 16px;
  box-shadow: 0 1px 0 var(--sep), 0 2px 12px rgba(0,0,0,0.05);
  position: relative;
}

.picker-row {
  display: flex;
  align-items: center;
  padding: 0 16px;
  min-height: 56px;
  gap: 12px;
  border-bottom: 1px solid var(--sep);
}
.picker-row:last-child { border-bottom: none; }

.picker-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.picker-icon.from { background: rgba(26,140,78,0.1); }
.picker-icon.to   { background: rgba(74,158,232,0.1); }

.picker-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.picker-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--label3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

select {
  width: 100%;
  background: transparent;
  border: none;
  padding: 0;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 500;
  color: var(--label);
  appearance: none;
  outline: none;
  cursor: pointer;
}
select.empty { color: var(--label3); font-size: 15px; }
select option { color: var(--label); background: var(--surface); font-size: 16px; }
select option[value=""] { display: none; }

.picker-chevron {
  color: var(--label4);
  flex-shrink: 0;
}

/* ── SWAP BUTTON ── */
.swap-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--sep);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.25s;
  z-index: 10;
}
.swap-btn:active { background: var(--sep); }
.swap-btn.spinning { transform: translateY(-50%) rotate(180deg); }

/* ── BANNERS ── */
.banner {
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 14px;
  display: none;
  letter-spacing: -0.1px;
  border-left: 3px solid;
}
.banner.visible { display: flex; align-items: center; gap: 8px; }
.banner-holiday { background: rgba(192,92,0,0.07); color: var(--orange); border-color: var(--orange); }
.banner-noservice { background: rgba(192,57,43,0.07); color: var(--red); border-color: var(--red); }

/* ── NEXT DEPARTURE CARD ── */
.next-card {
  background: var(--accent);
  border-radius: var(--radius);
  padding: 20px 20px 18px;
  margin-bottom: 16px;
  display: none;
  box-shadow: 0 4px 20px rgba(26,58,107,0.3);
  position: relative;
  overflow: hidden;
}
.next-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 160px; height: 160px;
  background: radial-gradient(circle at 100% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
/* decorative track lines */
.next-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.15) 0px,
    rgba(255,255,255,0.15) 20px,
    transparent 20px,
    transparent 30px
  );
}
.next-card.visible { display: block; }

.next-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.next-eyebrow::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4AE87A;
  box-shadow: 0 0 0 3px rgba(74,232,122,0.25);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(74,232,122,0.25); }
  50% { box-shadow: 0 0 0 6px rgba(74,232,122,0.1); }
}

.next-main {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 16px;
}

.next-dep-time {
  font-family: var(--mono);
  font-size: 56px;
  font-weight: 300;
  color: #fff;
  line-height: 1;
  letter-spacing: -2px;
}

.next-route {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.next-right {
  text-align: right;
  padding-bottom: 4px;
}

.next-countdown {
  font-family: var(--mono);
  font-size: 42px;
  font-weight: 300;
  color: #fff;
  line-height: 1;
  letter-spacing: -1px;
}

.next-countdown-label {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  font-weight: 600;
  margin-top: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.next-divider {
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin: 0 0 14px;
}

.next-arr-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.next-arr-label {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  font-weight: 500;
}

.next-arr-time {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.9);
}

.next-train-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  font-weight: 400;
  letter-spacing: 0.06em;
}

/* ── SHORT LINE BADGE ── */
.short-badge {
  display: inline-block;
  background: rgba(224,120,32,0.12);
  color: var(--orange);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  vertical-align: middle;
  margin-left: 4px;
}

/* ── DEPARTURE LIST ── */
.dep-list-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 1px 0 var(--sep), 0 2px 12px rgba(0,0,0,0.04);
}

.dep-row {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--sep);
  transition: background 0.1s;
}
.dep-row:last-child { border-bottom: none; }
.dep-row.is-next { background: rgba(37,99,192,0.04); }

.dep-row-main {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 14px;
}

/* station line dot */
.dep-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  width: 16px;
}
.dep-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--label4);
  border: 2px solid var(--label4);
  flex-shrink: 0;
}
.dep-dot.upcoming {
  background: var(--accent-light);
  border-color: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(37,99,192,0.15);
}
.dep-dot.past {
  background: transparent;
  border-color: var(--label4);
  opacity: 0.4;
}

.dep-times { flex: 1; min-width: 0; }

.dep-dep {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 400;
  color: var(--label);
  letter-spacing: -0.3px;
}
.dep-row.past-train .dep-dep {
  color: var(--label3);
}

.dep-arr {
  font-size: 12px;
  color: var(--label3);
  margin-top: 1px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.1px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

.dep-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.dep-train {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--label3);
  background: var(--surface2);
  border-radius: 5px;
  padding: 2px 7px;
  letter-spacing: 0.04em;
}

.dep-min-away {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-light);
  letter-spacing: -0.2px;
}

/* ── ROUTE DIAGRAM (intermediate stops) ── */
.dep-route-diagram {
  display: flex;
  flex-direction: column;
  padding: 0 16px 12px 42px;
}

.dep-route-stop {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dep-route-node-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  width: 7px;
}

.route-node {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  border: 1.5px solid var(--accent-light);
  background: transparent;
  flex-shrink: 0;
}
.route-node.endpoint { background: var(--accent-light); }

.route-seg {
  width: 1.5px;
  height: 7px;
  background: var(--sep);
  flex-shrink: 0;
}

.route-seg-spacer {
  height: 7px;
  flex-shrink: 0;
}

.dep-route-stop-name {
  font-size: 10.5px;
  color: var(--label3);
  font-weight: 500;
  line-height: 1.4;
  letter-spacing: -0.1px;
  padding: 3px 0;
}
.dep-route-stop-name.endpoint {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--label2);
}

.dep-route-stop-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--label3);
  margin-left: auto;
  padding-left: 10px;
}
.dep-route-stop-time.endpoint {
  font-size: 11px;
  color: var(--label2);
  font-weight: 500;
}

/* ── PAST TRAINS TOGGLE ── */
.past-toggle {
  text-align: center;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-light);
  letter-spacing: 0.02em;
  cursor: pointer;
  border-top: 1px solid var(--sep);
  transition: background 0.1s;
}
.past-toggle:active { background: var(--surface2); }

/* ── SHARE BLOCK ── */
.share-block {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  transition: opacity 0.2s;
}
.share-block.hidden { display: none; }

.share-qr {
  background: white;
  border-radius: 14px;
  padding: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.share-qr canvas, .share-qr img {
  display: block;
  border-radius: 6px;
}

.share-instructions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

.share-instruction {
  font-size: 11.5px;
  color: var(--label3);
  line-height: 1.5;
  text-align: center;
  letter-spacing: -0.1px;
}

.share-os {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-light);
  background: rgba(37,99,192,0.08);
  border-radius: 4px;
  padding: 1px 6px;
  margin-right: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.share-credit {
  font-size: 10px;
  color: var(--label4);
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-align: center;
}
.app-credit {
  text-align: center;
  padding: 12px 0 4px;
  font-size: 10px;
  color: var(--label4);
  font-weight: 500;
  letter-spacing: 0.06em;
  font-family: var(--mono);
}
.app-credit.hidden { display: none; }

.no-more {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: var(--label3);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── DETAIL VIEW ── */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.detail-overlay.open {
  transform: translateX(0);
}

.detail-nav {
  background: var(--accent);
  padding: 0 16px;
  padding-top: env(safe-area-inset-top, 0px);
  min-height: calc(env(safe-area-inset-top, 0px) + 56px);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.detail-nav-clock {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  padding: 3px 8px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

.detail-nav-info {
  flex: 1;
  min-width: 0;
  text-align: center;
}
.detail-nav-title {
  font-family: var(--mono);
  font-size: 17px;
  font-weight: 400;
  color: white;
  letter-spacing: 0.02em;
}
.detail-nav-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.detail-nav-badge {
  font-family: var(--mono);
  font-size: 11px;

.journey-line {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  width: 20px;
}

.journey-node {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid var(--label4);
  background: var(--bg);
  flex-shrink: 0;
  margin-top: 6px;
  transition: all 0.3s;
}
.journey-node.endpoint {
  width: 14px;
  height: 14px;
  border-color: var(--accent-light);
  background: var(--accent-light);
  margin-top: 5px;
}
.journey-node.current {
  width: 14px;
  height: 14px;
  border-color: var(--green);
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(29,185,84,0.2);
  margin-top: 5px;
  animation: pulseDot 2s infinite;
}
.journey-node.passed {
  border-color: var(--accent-light);
  background: var(--accent-light);
  opacity: 0.35;
}
@keyframes pulseDot {
  0%, 100% { box-shadow: 0 0 0 4px rgba(29,185,84,0.2); }
  50%       { box-shadow: 0 0 0 7px rgba(29,185,84,0.08); }
}

.journey-seg {
  width: 2px;
  flex: 1;
  background: var(--sep);
  margin: 2px 0;
  min-height: 16px;
}
.journey-seg.passed {
  background: var(--accent-light);
  opacity: 0.35;
}

.journey-info {
  flex: 1;

  align-items: center;
  justify-content: space-between;
  padding: 4px 0 16px;
  border-bottom: 1px solid var(--sep);
  gap: 8px;
}
.journey-stop:last-child .journey-info {
  border-bottom: none;
  padding-bottom: 4px;
}

.journey-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--label2);
  line-height: 1.3;
}
.journey-name.endpoint {
  font-size: 15px;
  font-weight: 700;
  color: var(--label);
}
.journey-name.current {
  font-size: 15px;
  font-weight: 700;
  color: var(--green);
}
.journey-name.passed {
  color: var(--label3);
}

.journey-time {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--label2);
  flex-shrink: 0;
}
.journey-time.endpoint {
  font-size: 15px;
  font-weight: 500;
  color: var(--label);
}
.journey-time.current {
  color: var(--green);

.journey-time.passed {
  color: var(--label3);
}

.journey-now-badge {
  font-size: 9px;
  font-weight: 700;

// ─── HELPERS ───────────────────────────────────────────────────────────────
function toMin(t) {
  if (!t) return null;
  const [h, m] = t.split('.').map(Number);
  return h * 60 + m;
}

function fmt(t) {
  if (!t) return '—';
  const [h, m] = t.split('.').map(Number);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function todayISO() { return new Date().toISOString().slice(0,10); }
function isNoServiceDay(date) {
  const d = date || new Date();
  const day = d.getDay(); // 0=Sun, 6=Sat
  if (day === 0 || day === 6) return true;
  return HOLIDAYS.has(d.toISOString().slice(0,10));
}
function isHoliday() { return HOLIDAYS.has(todayISO()); } // kept for banner only
function nowMin() { const n = new Date(); return n.getHours()*60+n.getMinutes(); }

function isShortTrain(tr, to) {
  return tr.t[to] === null || tr.t[to] === undefined;
}

    const oF = document.createElement('option');
    oF.value = oF.textContent = s;
    if (saved.from === s) oF.selected = true;
    f.appendChild(oF);

    const oT = document.createElement('option');
    oT.value = oT.textContent = s;
    if (saved.to === s) oT.selected = true;
    t.appendChild(oT);
  });
  updateSelectStyle(f);
  updateSelectStyle(t);
}

function updateSelectStyle(sel) {
  if (sel.value === '') {
    sel.classList.add('empty');
  } else {
    sel.classList.remove('empty');
  }
}

function swapStations() {
  const f = document.getElementById('fromStation');
  const t = document.getElementById('toStation');
  [f.value, t.value] = [t.value, f.value];
  const btn = document.getElementById('swapBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 300);
  render();
}

// ─── DIRECTION DETECTION ───────────────────────────────────────────────────
function detectDirection(from, to) {
  const iAf = STATIONS_A.indexOf(from), iAt = STATIONS_A.indexOf(to);
  if (iAf !== -1 && iAt !== -1 && iAf < iAt) return 'A';
  const iBf = STATIONS_B.indexOf(from), iBt = STATIONS_B.indexOf(to);
  if (iBf !== -1 && iBt !== -1 && iBf < iBt) return 'B';
  return null;
}

function getTrains(dir, from, to, noService) {
  const pool = dir === 'A' ? TRAINS_A : TRAINS_B;
  return pool.filter(tr => {
    // hol:true    = special holiday-only train (8340)
    // hol:false = only runs Mon–Fri, not on weekends or holidays
    // hol:false   = runs every day including weekends
    if (tr.hol === true && !noService) return false;   // holiday train, not a holiday → skip
    if (tr.hol === true && noService) return true;     // holiday train, is holiday → include (but check times below)
    if (tr.hol === 'weekday' && noService) return false; // weekday train, weekend/holiday → skip
    // hol:false and hol:false on a weekday → always include
    const depT = tr.t[from];
    const arrT = tr.t[to];
    if (!depT) return false;
    if (!arrT) return false;
    return toMin(arrT) > toMin(depT);
  });
}

// Find first train on the next working day (used when no more trains today)
function getTomorrowTrains(dir, from, to) {
  const pool = dir === 'A' ? TRAINS_A : TRAINS_B;
  for (let offset = 1; offset <= 7; offset++) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    d.setHours(0,0,0,0);
    const ns = isNoServiceDay(d);
    const trains = pool.filter(tr => {
      if (tr.hol === true && !ns) return false;
      if (tr.hol === 'weekday' && ns) return false;
      if (!tr.t[from] || !tr.t[to]) return false;
      return toMin(tr.t[to]) > toMin(tr.t[from]);
    });
    if (trains.length) return trains;
  }
  return [];
}

// ─── PERSISTENCE ───────────────────────────────────────────────────────────
function getSaved() {
  try {
    const h = location.hash.slice(1);
    if (h) {
      const p = new URLSearchParams(h);
      return { from: p.get('od') || '', to: p.get('do') || '' };
    }
    const raw = localStorage.getItem('bgvoz_route');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { from: '', to: '' };
}

function saveRoute(from, to) {
  try {
    localStorage.setItem('bgvoz_route', JSON.stringify({from, to}));
    if (from && to) {
      const p = new URLSearchParams();
      p.set('od', from); p.set('do', to);
      history.replaceState(null, '', '#' + p.toString());
    } else {
      history.replaceState(null, '', location.pathname);
    }
  } catch(e) {}
}

// ─── INTERMEDIATE STOPS ────────────────────────────────────────────────────
function getIntermediateStops(dir, from, to) {
  const stations = dir === 'A' ? STATIONS_A : STATIONS_B;
  const iFrom = stations.indexOf(from);
  const iTo   = stations.indexOf(to);
  if (iFrom === -1 || iTo === -1 || iTo <= iFrom + 1) return [];
  return stations.slice(iFrom + 1, iTo);
}

function renderRouteDiagram(tr, from, to, midStops) {
  const allStops = [from, ...midStops.filter(s => tr.t[s] != null), to];
  let html = '';
  allStops.forEach((s, i) => {
    const isFirst    = i === 0;
    const isLast     = i === allStops.length - 1;
    const isEndpoint = isFirst || isLast;
    const t = tr.t[s];
    html += `<div class="dep-route-stop">
      <div class="dep-route-node-col">
        ${!isFirst ? '<div class="route-seg"></div>' : '<div class="route-seg-spacer"></div>'}
        <div class="route-node${isEndpoint ? ' endpoint' : ''}"></div>
        ${!isLast ? '<div class="route-seg"></div>' : '<div class="route-seg-spacer"></div>'}
      </div>
      <span class="dep-route-stop-name${isEndpoint ? ' endpoint' : ''}">${s}</span>
      <span class="dep-route-stop-time${isEndpoint ? ' endpoint' : ''}">${fmt(t)}</span>
    </div>`;
  });
  return `<div class="dep-route-diagram">${html}</div>`;
}

// ─── DETAIL VIEW ───────────────────────────────────────────────────────────
let detailTimer = null;

function openDetail(trainId, from, to, dir) {
  const pool = dir === 'A' ? TRAINS_A : TRAINS_B;
  const tr = pool.find(t => t.id === trainId);
  if (!tr) return;

  const stations = dir === 'A' ? STATIONS_A : STATIONS_B;
  const iFrom = stations.indexOf(from);
  const iTo   = stations.indexOf(to);
  const stops  = stations.slice(iFrom, iTo + 1).filter(s => tr.t[s] != null);

  document.getElementById('detailTitle').textContent = fmt(tr.t[from]) + ' → ' + fmt(tr.t[to]);
  document.getElementById('detailSub').textContent = from + ' → ' + to;
  document.getElementById('detailBadge').textContent = trainId;

  // start detail clock
  function tickDetailClock() {
    const n = new Date();
    const el = document.getElementById('detailClock');
    if (el) el.textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  }
  tickDetailClock();
  if (detailTimer) clearInterval(detailTimer);
  detailTimer = setInterval(() => { tickDetailClock(); renderDetail(tr, stops); }, 30000);

  renderDetail(tr, stops);
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if (detailTimer) { clearInterval(detailTimer); detailTimer = null; }
}

function renderDetail(tr, stops) {
  const nm = nowMin();
  const depMin = toMin(tr.t[stops[0]]);
  const arrMin = toMin(tr.t[stops[stops.length - 1]]);

  let liveHtml = '';

  if (nm < depMin) {
    // Train hasn't departed yet
    const minsLeft = depMin - nm;
    liveHtml = `<div class="live-card">
      <div class="live-label">Чека на поласку</div>
      <div class="live-not-departed">Полазак за <span>${minsLeft} мин.</span> у ${fmt(tr.t[stops[0]])}</div>
    </div>`;
  } else if (nm >= arrMin) {
    // Journey completed
    liveHtml = `<div class="live-card">
      <div class="live-label" style="color:var(--label3)">Путовање завршено</div>
      <div class="live-completed">Воз је стигао у ${fmt(tr.t[stops[stops.length-1]])}</div>
    </div>`;
  } else {
    // Train is en route — find current and next stop
    let currentStop = null, nextStop = null;
    for (let i = 0; i < stops.length - 1; i++) {
      const s = stops[i], sNext = stops[i + 1];
      if (toMin(tr.t[s]) <= nm && toMin(tr.t[sNext]) > nm) {
        currentStop = s;
        nextStop = sNext;
        break;
      }
    }

    if (currentStop && nextStop) {
      const segStart = toMin(tr.t[currentStop]);
      const segEnd   = toMin(tr.t[nextStop]);
      const elapsed  = nm - segStart;
      const total    = segEnd - segStart;
      const pct      = Math.min(100, Math.round((elapsed / total) * 100));

      liveHtml = `<div class="live-card">
        <div class="live-label">Тренутно у вожњи</div>
        <div class="live-stations">
          <div class="live-station current">
            <div class="live-station-label">Тренутна</div>
            <div class="live-station-name">${currentStop}</div>
            <div class="live-station-time">${fmt(tr.t[currentStop])}</div>
          </div>
          <div class="live-arrow">→</div>
          <div class="live-station next">
            <div class="live-station-label">Следећа</div>
            <div class="live-station-name">${nextStop}</div>
            <div class="live-station-time">${fmt(tr.t[nextStop])}</div>
          </div>
        </div>
        <div class="live-progress-wrap">
          <div class="live-progress-bar" style="width:${pct}%"></div>
          <div class="live-progress-train" style="left:${pct}%"></div>
        </div>
        <div class="live-progress-labels">
          <span>${fmt(tr.t[currentStop])}</span>
          <span>${fmt(tr.t[nextStop])}</span>
        </div>
      </div>`;
    }
  }

  // Station list
  let stopsHtml = '';
  stops.forEach((s, i) => {
    const isFirst    = i === 0;
    const isLast     = i === stops.length - 1;
    const isEndpoint = isFirst || isLast;
    const stopMin    = toMin(tr.t[s]);
    const nextS      = stops[i + 1];
    const nextMin    = nextS ? toMin(tr.t[nextS]) : null;

    let state = 'future';
    if (stopMin < nm) state = 'passed';
    if (stopMin <= nm && nextMin !== null && nextMin > nm) state = 'current';
    if (isLast && stopMin <= nm) state = 'passed';

    const nodeClass = state === 'current' ? 'current' : state === 'passed' ? 'passed' : isEndpoint ? 'endpoint' : '';
    const nameClass = state === 'current' ? 'current' : state === 'passed' ? 'passed' : isEndpoint ? 'endpoint' : '';
    const timeClass = state === 'current' ? 'current' : state === 'passed' ? 'passed' : isEndpoint ? 'endpoint' : '';
    const segClass  = (state === 'passed' || state === 'current') ? 'passed' : '';

    stopsHtml += `<div class="journey-stop">
      <div class="journey-line">
        <div class="journey-node ${nodeClass}"></div>
        ${!isLast ? `<div class="journey-seg ${segClass}"></div>` : ''}
      </div>
      <div class="journey-info">
        <div class="journey-name ${nameClass}">${s}</div>
        <div style="display:flex;align-items:center;gap:6px">
          ${state === 'current' ? '<div class="journey-now-badge">сада</div>' : ''}
          <div class="journey-time ${timeClass}">${fmt(tr.t[s])}</div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('detailScroll').innerHTML = liveHtml + stopsHtml +
    `<button class="zavrsi-btn" onclick="closeDetail()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Заврши путовање
    </button>`;

  setTimeout(() => {
    const el = document.querySelector('.journey-node.current');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ─── RENDER ────────────────────────────────────────────────────────────────
let cdTimer = null;

function render() {
  const from = document.getElementById('fromStation').value;
  const to   = document.getElementById('toStation').value;
  const res  = document.getElementById('results');
  const nosB = document.getElementById('noServiceBanner');

  nosB.classList.remove('visible');
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }

  // show home button only when both stations are selected
  
  

  saveRoute(from, to);
  setCredit(true);
  document.getElementById('navInfoBtn').classList.add('visible');

  if (!from || !to) {
    showHome(true);
    return;
  }
  if (from === to) {
    res.innerHTML = emptyState('↩', 'Иста станица', 'Полазна и одредишна станица не смеју бити исте.');
    return;
  }

  const dir = detectDirection(from, to);
  if (!dir) {
    res.innerHTML = emptyState('🔄', 'Неважећи смер', 'За овај смер нема директне линије. Замените станице.');
    return;
  }

  const holiday = isHoliday();
  const noService = isNoServiceDay();
  const trains = getTrains(dir, from, to, noService);

  if (!trains.length) {
    nosB.classList.add('visible');
    res.innerHTML = emptyState('⛔', 'Нема возова', 'Нема возова за овај правац данас.');
    return;
  }

  const nm = nowMin();
  const dirLabel = dir === 'A' ? 'Овча → Батајница' : 'Батајница → Овча';
  const future = trains.filter(tr => toMin(tr.t[from]) >= nm);
  const next   = future[0] || null;

  let html = '';

  // ── NEXT CARD ──
  if (next) {
    const dep = next.t[from];
    const arr = next.t[to];
    const diff = toMin(dep) - nm;
    const isShort = !arr;
    html += `
    <div class="next-card visible">
      <div class="next-eyebrow">${from}</div>
      <div class="next-main">
        <div class="next-left">
          <div class="next-dep-time">${fmt(dep)}</div>
          <div class="next-route">${dirLabel}</div>
        </div>
        <div class="next-right">
          <div class="next-countdown" id="cdNum">${Math.max(0,diff)}</div>
          <div class="next-countdown-label">мин. до поласка</div>
        </div>
      </div>
      <div class="next-divider"></div>
      <div class="next-arr-row">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
          <circle cx="8" cy="8" r="5" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>

        <span class="next-arr-time">${fmt(arr)}</span>
        <span class="next-train-badge">${next.id}</span>
      </div>
    </div>`;
  }

  // ── NO MORE + TOMORROW FULL LIST ──
  if (!future.length) {
    const tomorrowTrains = getTomorrowTrains(dir, from, to);
    html += `<div class="no-more">Нема више полазака за данас</div>`;
    if (tomorrowTrains.length) {
      html += `<div class="section-header" style="margin-top:12px">Сутрашњи поласци</div>
      <div class="dep-list-card">`;
      tomorrowTrains.forEach((tr, i) => {
        const dep = tr.t[from];
        const arr = tr.t[to];
        const rowId = `row-tom-${tr.id}`;
        html += `<div class="dep-row" id="${rowId}">
          <div class="dep-row-main" onclick="toggleRow('${rowId}')" style="cursor:pointer">
            <div class="dep-track">
              <div class="dep-dot"></div>
            </div>
            <div class="dep-times">
              <div class="dep-dep">${fmt(dep)}</div>
              <div class="dep-arr">${from} → ${to} у ${fmt(arr)}</div>
            </div>
            <div class="dep-right">
              <div class="dep-train">${tr.id}</div>
              <svg class="dep-chevron" width="12" height="12" viewBox="0 0 16 16" fill="none" style="opacity:0.3;margin-top:2px;transition:transform 0.2s">
                <path d="M4 6L8 10L12 6" stroke="var(--label)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <div class="dep-diagram-wrap">
            ${renderRouteDiagram(tr, from, to, getIntermediateStops(dir, from, to))}
            <button class="kreni-btn kreni-disabled" disabled>
              Крени од сутра
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
                <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
  }

  // ── UPCOMING LIST ──
  if (future.length) {
    const midStops = getIntermediateStops(dir, from, to);
    html += `<div class="section-header" style="margin-top:4px">Предстојећи поласци</div>
    <div class="dep-list-card">`;
    future.forEach((tr, i) => {
      const dep = tr.t[from];
      const arr = tr.t[to];
      if (!arr) return;
      const isNext = i === 0;
      const minsAway = toMin(dep) - nm;
      const rowId = `row-${tr.id}`;
      html += `<div class="dep-row ${isNext ? 'is-next' : ''}" id="${rowId}">
        <div class="dep-row-main" onclick="toggleRow('${rowId}')" style="cursor:pointer">
          <div class="dep-track">
            <div class="dep-dot ${isNext ? 'upcoming' : ''}"></div>
          </div>
          <div class="dep-times">
            <div class="dep-dep">${fmt(dep)}</div>
            <div class="dep-arr">${from} → ${to} у ${fmt(arr)}</div>
          </div>
          <div class="dep-right">
            <div class="dep-train">${tr.id}</div>
            ${isNext ? `<div class="dep-min-away">${minsAway} мин.</div>` : ''}
            <svg class="dep-chevron" width="12" height="12" viewBox="0 0 16 16" fill="none" style="opacity:0.3;margin-top:2px;transition:transform 0.2s">
              <path d="M4 6L8 10L12 6" stroke="var(--label)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="dep-diagram-wrap">
          ${renderRouteDiagram(tr, from, to, midStops)}
          <button class="kreni-btn" onclick="openDetail('${tr.id}','${from}','${to}','${dir}')">
            Крени
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
              <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  res.innerHTML = html;

  // countdown
  if (next) {
    function updateCd() {
      const d = toMin(next.t[from]) - nowMin();
      const el = document.getElementById('cdNum');
      if (el) el.textContent = Math.max(0, d);
    }
    updateCd();
    cdTimer = setInterval(updateCd, 30000);
  }
}

          }
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
