<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BG:VOZ Live</title>
<style>
:root {
  --glass-bg: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.18);
  --glass-blur: blur(25px);
  --accent-yellow: #FFD700;
  --text-main: #FFFFFF;
  --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-ios);
  color: var(--text-main);
  height: 100vh; width: 100vw; overflow: hidden;
  background: linear-gradient(-45deg, #050a14, #1a0505, #0a1428, #140514);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

.page {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  padding-top: 80px; padding-bottom: 120px;
  opacity: 0; pointer-events: none; transform: scale(1.1);
  overflow-y: auto;
}
.page.active { opacity: 1; pointer-events: auto; transform: scale(1); }

/* PIDS BOARD */
.pids-board { width: 100%; background: #000; border: 1px solid #222; border-radius: 15px; overflow: hidden; margin-top: 10px; }
.pids-row { display: grid; grid-template-columns: 70px 1fr 100px; padding: 18px 15px; border-bottom: 1px solid #111; align-items: center; }
.col-vnum { text-align: left; color: #666; font-family: monospace; font-size: 0.85rem; }
.col-dir { text-align: left; padding-left: 5px; color: var(--accent-yellow); font-weight: 700; font-size: 0.95rem; text-transform: uppercase; }
.col-time { text-align: right; color: var(--accent-yellow); font-family: monospace; font-size: 1.2rem; font-weight: bold; }

/* Navigation */
.nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
.nav-item { height: 100%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.4; transition: all 0.3s; cursor: pointer; flex: 1; }
.nav-item.active { opacity: 1; }
.nav-item svg { width: 28px; height: 28px; }

/* Home Header */
.top-section { text-align: center; margin-bottom: 30px; }
.modern-train-icon { width: 64px; height: 64px; margin-bottom: 10px; }
h1 { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; }
.center-section { width: 100%; padding: 0 32px; display: flex; flex-direction: column; gap: 12px; }
.btn-large { width: 100%; padding: 20px; font-size: 0.8rem; font-weight: 700; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg); text-transform: uppercase; text-align: center; cursor: pointer; }

/* QR Code Styling */
.qr-container { margin-top: 20px; display: flex; justify-content: center; width: 100%; }
.qr-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); padding: 16px; border-radius: 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 150px; }
.qr-image { width: 110px; height: 110px; border-radius: 10px; filter: brightness(1.1); }
.qr-text { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.1em; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; }

/* Planner UI */
.plan-controls { width: 100%; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
.input-group { background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; backdrop-filter: var(--glass-blur); }
.plan-select { width: 100%; padding: 18px; background: transparent; border: none; color: white !important; font-size: 1rem; outline: none; appearance: none; }
.plan-select option { background: #1a1a2e; color: white; }
</style>
</head>
<body>

<div id="home-page" class="page active">
  <header class="top-section">
    <svg class="modern-train-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <rect x="5" y="2" width="14" height="16" rx="3"/><line x1="5" y1="12" x2="19" y2="12"/>
      <circle cx="9" cy="15" r="1" fill="white"/><circle cx="15" cy="15" r="1" fill="white"/>
    </svg>
    <h1>BG:VOZ</h1>
  </header>
  <main class="center-section">
    <div class="btn-large" onclick="goTo('monitor')">STANIČNI RED VOŽNJE</div>
    <div class="btn-large" onclick="goTo('plan')">PLANIRAJ PUTOVANJE</div>
    
    <div class="qr-container">
      <div class="qr-card">
        <img id="pwa-qr" src="" alt="PWA" class="qr-image">
        <div class="qr-text">SKENIRAJ</div>
      </div>
    </div>
  </main>
</div>

<div id="monitor-page" class="page">
  <div class="plan-controls">
    <div class="input-group">
      <select id="stationPicker" class="plan-select" onchange="updatePIDS(this.value)">
        <option value="" disabled selected>Izaberi stanicu</option>
      </select>
    </div>
  </div>
  <div id="pidsDisplay" style="display:none; width: 100%; padding: 0 20px; margin-top:15px;">
    <div class="pids-board"><div id="pidsBody"></div></div>
  </div>
</div>

<div id="plan-page" class="page">
  <div class="plan-controls">
    <div class="input-group">
      <select id="fromPicker" class="plan-select" onchange="runPlanner()"><option value="" disabled selected hidden>Polazak</option></select>
      <div style="height:1px; background:var(--glass-border); margin:0 16px;"></div>
      <select id="toPicker" class="plan-select" onchange="runPlanner()"><option value="" disabled selected hidden>Dolazak</option></select>
    </div>
  </div>
  <div id="plannerResults" style="width: 100%; margin-top: 5px;"></div>
</div>

<nav class="nav-bar">
  <div class="nav-item active" id="nav-home" onclick="goTo('home')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
  </div>
  <div class="nav-item" id="nav-monitor" onclick="goTo('monitor')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
  </div>
  <div class="nav-item" id="nav-plan" onclick="goTo('plan')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg>
  </div>
</nav>

<script>
const stationMap = {
  'batajnica': 'Batajnica', 'kamendin': 'Kamendin', 'zemun_polje': 'Zemun Polje',
  'altina': 'Altina', 'zemun': 'Zemun', 'tosin_bunar': 'Tosin Bunar',
  'novi_beograd': 'Novi Beograd', 'beograd_centar': 'Beograd Centar',
  'karadjordjev_park': 'Karadjordjev Park', 'vukov_spomenik': 'Vukov Spomenik',
  'pancevacki_most': 'Pancevacki Most', 'krnjaca_most': 'Krnjaca Most',
  'krnjaca': 'Krnjaca', 'sebes': 'Sebes', 'ovca': 'Ovca',
  'resnik': 'Resnik', 'kijevo': 'Kijevo', 'knezevac': 'Knezevac', 'rakovica': 'Rakovica'
};

let trainData = [];

function populatePickers() {
  const sorted = Object.entries(stationMap).sort((a, b) => a[1].localeCompare(b[1]));
  let html = `<option value="" disabled selected hidden>Izaberi stanicu...</option>`;
  sorted.forEach(([id, name]) => {
    html += `<option value="${id}">${name}</option>`;
  });
  document.getElementById('stationPicker').innerHTML = html;
  document.getElementById('fromPicker').innerHTML = html;
  document.getElementById('toPicker').innerHTML = html;
}

async function loadTrainData() {
  try {
    const res = await fetch('trains.json');
    trainData = await res.json();
  } catch (e) { console.error("JSON Error"); }
}

function generateQRCode() {
  const pwaUrl = window.location.href;
  const qrElement = document.getElementById('pwa-qr');
  qrElement.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pwaUrl)}&color=ffffff&bgcolor=333333`;
}

function updatePIDS(sid) {
  const target = stationMap[sid];
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  let html = '';
  trainData.forEach(train => {
    const stop = train.stops.find(s => s.station === target);
    if(stop) {
      const [h, m] = stop.departure.split(':').map(Number);
      if((h * 60 + m) >= nowMin) {
        html += `<div class="pids-row">
          <div class="col-vnum">${train.train_id}</div>
          <div class="col-dir">${train.direction.toUpperCase()}</div>
          <div class="col-time">${stop.departure}</div>
        </div>`;
      }
    }
  });
  document.getElementById('pidsDisplay').style.display = 'block';
  document.getElementById('pidsBody').innerHTML = html || '<p style="padding:20px; text-align:center;">Nema polazaka.</p>';
}

function runPlanner() {
  const f = document.getElementById('fromPicker').value;
  const t = document.getElementById('toPicker').value;
  if(!f || !t || f === t) return;
  let html = '';
  trainData.forEach(train => {
    const sIdx = train.stops.findIndex(s => s.station === stationMap[f]);
    const eIdx = train.stops.findIndex(s => s.station === stationMap[t]);
    if(sIdx !== -1 && eIdx !== -1 && sIdx < eIdx) {
      html += `<div style="background:var(--glass-bg); margin:10px 20px; padding:15px; border-radius:15px; display:flex; justify-content:space-between; border:1px solid var(--glass-border);">
        <div style="font-weight:bold; color:var(--accent-yellow);">${train.stops[sIdx].departure} → ${train.stops[eIdx].departure}</div>
        <div style="opacity:0.6;">Voz ${train.train_id}</div>
      </div>`;
    }
  });
  document.getElementById('plannerResults').innerHTML = html || '<p style="text-align:center; padding:20px;">Nema rezultata.</p>';
}

function goTo(screen) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(screen + '-page').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + screen).classList.add('active');
}

populatePickers();
loadTrainData();
generateQRCode();
</script>
</body>
</html>
