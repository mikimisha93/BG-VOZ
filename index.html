<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>БГ:воз</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #06080f;
    --l1: #c0392b;
    --l2: #1a6fc4;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --dim: rgba(255,255,255,0.4);
    --yellow: #f0c040;
    --green: #3ddc84;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh; width: 100vw;
    overflow: hidden;
    position: relative;
}

body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background: 
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(192,57,43,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(26,111,196,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 70%);
    pointer-events:none;
}

/* ── PAGES ── */
.page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 1;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
    padding-bottom: 110px;
    overflow: hidden;
}
#page-landing { opacity:1; transform:translateY(0); }
#page-monitor { opacity:0; transform:translateY(100%); pointer-events:none; }
#page-planner { opacity:0; transform:translateY(100%); pointer-events:none; }
.page.visible { opacity:1 !important; transform:translateY(0) !important; pointer-events:all !important; }
.page.hidden-back { opacity:0 !important; pointer-events:none !important; }

/* ── NEW LANDING STYLES ── */
.landing-inner {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; /* Centered content like the 2nd HTML */
    height: 100%; width: 100%; padding: 0 28px;
    gap: 40px;
}
.brand { text-align:center; }
.brand-icon { margin-bottom: 16px; }
.brand-name {
    font-family: var(--mono);
    font-size: 3rem; font-weight:700;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.4));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-sub { font-size:0.8rem; opacity:0.4; letter-spacing:0.3em; text-transform:uppercase; margin-top:8px; }

.landing-actions { width:100%; max-width:320px; display:flex; flex-direction:column; gap:16px; }
.action-btn {
    width:100%; padding:22px;
    border-radius:20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    color: var(--text);
    font-family: var(--sans); font-size:0.9rem; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    cursor:pointer; text-align:center;
    transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
.action-btn:active { transform:scale(0.96); background: rgba(255,255,255,0.1); }

.landing-qr { margin-top: 20px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.qr-wrap { background:white; padding:10px; border-radius:18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.qr-wrap img { width:100px; height:100px; display:block; border-radius:10px; }
.qr-label { font-size:0.75rem; opacity:0.3; font-family:var(--mono); letter-spacing: 0.05em; }

/* ── SHARED PAGE CHROME ── */
.page-header { width:100%; padding: 6vh 24px 0; flex-shrink:0; }
.page-title { font-size:1.1rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; opacity:0.9; margin-bottom:20px; text-align:center; }
.g-select { width:100%; padding:16px 20px; border-radius:14px; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); color: white; font-family:var(--sans); font-size:1rem; outline:none; appearance:none; }
option { background:#111827; color:white; }

/* ── MONITOR & PLANNER STYLES (Kept from original) ── */
.monitor-body, .planner-body { width:100%; padding:0 20px; display:flex; flex-direction:column; gap:16px; flex:1; min-height:0; }
.pids-board { background:#000; border:2px solid #222; border-radius:12px; overflow:hidden; flex:1; display:flex; flex-direction:column; }
.pids-head { display:grid; grid-template-columns:80px 1fr 72px; padding:10px 16px; background:#111; border-bottom:1px solid #222; font-family:var(--mono); font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
.pids-rows { overflow-y:auto; flex:1; }
.pids-row { display:grid; grid-template-columns:80px 1fr 72px; padding:14px 16px; border-bottom:1px solid #111; font-family:var(--mono); align-items:center; }
.pids-dir, .pids-time { font-size:1rem; font-weight:700; color:var(--yellow); }

.line-selector { display:flex; gap:10px; }
.line-btn { flex:1; padding:14px; border-radius:14px; border:2px solid transparent; background: var(--glass); color:white; font-size:0.85rem; font-weight:700; cursor:pointer; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px; }
.line-btn.active-l1 { border-color:var(--l1); background:rgba(192,57,43,0.2); }
.line-btn.active-l2 { border-color:var(--l2); background:rgba(26,111,196,0.2); }
.station-row { display:flex; align-items:center; gap:10px; }
.swap-btn { width:44px; height:44px; border-radius:50%; background:var(--glass); border:1px solid var(--glass-border); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.results-scroll { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
.result-card { border-radius:16px; background:var(--glass); border:1px solid var(--glass-border); cursor:pointer; }

/* ── NAV BAR ── */
.nav-bar { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); width:calc(100% - 48px); max-width:320px; height:66px; background:rgba(10,12,20,0.85); backdrop-filter:blur(30px); border:1px solid var(--glass-border); border-radius:33px; display:flex; justify-content:space-around; align-items:center; z-index:9999; }
.nav-btn { width:54px; height:54px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:50%; }
.nav-btn svg { width:24px; height:24px; fill:rgba(255,255,255,0.35); }
.nav-btn.active svg { fill:white; filter:drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
</style>
</head>
<body>

<div id="page-landing" class="page">
    <div class="landing-inner">
        <div class="brand">
            <div class="brand-icon">
                <svg width="60" height="60" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="6" width="36" height="30" rx="6" stroke="white" stroke-width="2.5"/>
                    <line x1="8" y1="22" x2="44" y2="22" stroke="white" stroke-width="2" opacity="0.5"/>
                    <circle cx="17" cy="30" r="2.5" fill="white"/>
                    <circle cx="35" cy="30" r="2.5" fill="white"/>
                    <path d="M16 42 L14 36 M36 42 L38 36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="brand-name">БГ:ВОЗ</div>
            <div class="brand-sub">Градска железница</div>
        </div>

        <div class="landing-actions">
            <button class="action-btn" onclick="goMonitor()">Станични Монитор</button>
            <button class="action-btn" onclick="goPlanner()">Планирај Путовање</button>
        </div>

        <div class="landing-qr">
            <div class="qr-wrap">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://mikimisha93.github.io/BG-VOZ/&margin=4" alt="QR">
            </div>
            <div class="qr-label">mikimisha93.github.io/BG-VOZ</div>
        </div>
    </div>
</div>

<div id="page-monitor" class="page">
    <div class="page-header">
        <div class="page-title">Станични Монитор</div>
    </div>
    <div class="monitor-body">
        <select id="mon-station" class="g-select" onchange="renderPIDS()">
            <option value="" disabled selected>Изаберите станицу...</option>
        </select>
        <div class="pids-board" id="pids-board" style="display:none">
            <div class="pids-head">
                <span>Воз</span><span>Смер</span><span>Полазак</span>
            </div>
            <div class="pids-rows" id="pids-rows"></div>
        </div>
    </div>
</div>

<div id="page-planner" class="page">
    <div class="page-header">
        <div class="page-title">Планирај Путовање</div>
    </div>
    <div class="planner-body">
        <div class="line-selector">
            <div class="line-btn" id="btn-l1" onclick="selectLine(1)">
                <div style="width:12px;height:12px;border-radius:50%;background:var(--l1)"></div>
                BG:воз 1
            </div>
            <div class="line-btn" id="btn-l2" onclick="selectLine(2)">
                <div style="width:12px;height:12px;border-radius:50%;background:var(--l2)"></div>
                BG:воз 2
            </div>
        </div>
        <div class="station-row">
            <select id="plan-from" class="g-select" onchange="onPickersChange()" disabled><option value="">Полазиште</option></select>
        </div>
        <div class="station-row">
            <select id="plan-to" class="g-select" onchange="onPickersChange()" disabled><option value="">Одредиште</option></select>
            <div class="swap-btn" onclick="swapStations()">⇄</div>
        </div>
        <div id="plan-results" class="results-scroll"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-btn active" id="nav-home" onclick="goHome()">
        <svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
    </div>
    <div class="nav-btn" id="nav-mon" onclick="navMonitor()">
        <svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 12,20M12,2A10,10 0 0,1 12,22C6.47,22 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg>
    </div>
    <div class="nav-btn" id="nav-plan" onclick="navPlanner()">
        <svg viewBox="0 0 24 24"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg>
    </div>
</nav>

<script>
let ALL_TRAINS = [];
async function loadData() {
    try {
        const res = await fetch('trains.json');
        ALL_TRAINS = await res.json();
        buildMonitorPicker();
    } catch(e) { console.error("Data load failed", e); }
}

function norm(name) { return name.replace(/\s*\((Arr|Dep)\)\s*$/i, '').trim(); }
function nowHHMM() { return new Date().toTimeString().slice(0, 5); }

let currentPage = 'landing';
function showPage(name) {
    ['landing','monitor','planner'].forEach(p => {
        const el = document.getElementById('page-' + p);
        if (p === name) { el.classList.add('visible'); el.classList.remove('hidden-back'); }
        else { el.classList.remove('visible'); el.classList.add('hidden-back'); }
    });
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const map = { landing:'nav-home', monitor:'nav-mon', planner:'nav-plan' };
    document.getElementById(map[name]).classList.add('active');
    currentPage = name;
}

function goHome() { showPage('landing'); }
function goMonitor() { showPage('monitor'); }
function goPlanner() { showPage('planner'); }
function navMonitor() { goMonitor(); }
function navPlanner() { goPlanner(); }

function buildMonitorPicker() {
    const monSet = new Set();
    ALL_TRAINS.forEach(t => t.stops.forEach((s, i) => { if (i < t.stops.length - 1) monSet.add(norm(s.station)); }));
    const el = document.getElementById('mon-station');
    [...monSet].sort().forEach(s => el.add(new Option(s, s)));
}

function renderPIDS() {
    const station = document.getElementById('mon-station').value;
    const body = document.getElementById('pids-rows');
    document.getElementById('pids-board').style.display = 'flex';
    const now = nowHHMM();
    const rows = ALL_TRAINS.map(t => {
        const s = t.stops.find(st => norm(st.station) === station);
        return s && s.departure > now ? {id: t.train_id, dir: norm(t.direction), dep: s.departure} : null;
    }).filter(x => x).sort((a,b) => a.dep.localeCompare(b.dep)).slice(0, 10);
    
    body.innerHTML = rows.length ? rows.map(r => `
        <div class="pids-row">
            <span style="color:var(--dim);font-size:0.7rem">${r.id}</span>
            <span class="pids-dir">${r.dir}</span>
            <span class="pids-time">${r.dep}</span>
        </div>`).join('') : '<div style="padding:40px;text-align:center;opacity:0.3">Нема полазака</div>';
}

function selectLine(n) {
    document.getElementById('btn-l1').className = 'line-btn' + (n===1 ? ' active-l1' : '');
    document.getElementById('btn-l2').className = 'line-btn' + (n===2 ? ' active-l2' : '');
    const lineKey = n === 1 ? 'BG:voz 1' : 'BG:voz 2';
    const stSet = new Set();
    ALL_TRAINS.filter(t => t.line === lineKey).forEach(t => t.stops.forEach(s => stSet.add(norm(s.station))));
    ['plan-from','plan-to'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = `<option value="" disabled selected>${id==='plan-from'?'Полазиште':'Одредиште'}</option>`;
        [...stSet].sort().forEach(s => el.add(new Option(s, s)));
        el.disabled = false;
    });
}

function onPickersChange() { /* Logic for finding routes would go here as in your previous script */ }
function swapStations() {
    const f = document.getElementById('plan-from'), t = document.getElementById('plan-to');
    const v = f.value; f.value = t.value; t.value = v;
}

loadData();
</script>
</body>
</html>
