
<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>БГ:воз</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #1a1f2c; 
    --l1: #c0392b;
    --l2: #1a6fc4;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.2); 
    --text: #f0f0f0;
    --dim: rgba(255,255,255,0.4);
    --yellow: #f0c040;
    --green: #3ddc84;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh; width: 100vw;
    overflow: hidden;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    z-index: 0;
    background: 
        radial-gradient(circle at 30% 30%, rgba(192,57,43,0.4) 0%, transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(26,111,196,0.4) 0%, transparent 40%);
    background-color: var(--bg);
    filter: blur(60px);
    pointer-events: none;
    animation: meshMove 25s ease-in-out infinite alternate;
}

/* ── PAGES ── */
.page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 1;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
    padding-bottom: 110px;
    overflow: hidden;
}
#page-landing { opacity:1; transform:translateY(0); }
#page-monitor { opacity:0; transform:translateY(100%); pointer-events:none; }
#page-planner { opacity:0; transform:translateY(100%); pointer-events:none; }
.page.visible { opacity:1 !important; transform:translateY(0) !important; pointer-events:all !important; }
.page.hidden-back { opacity:0 !important; pointer-events:none !important; }

/* ── LANDING ── */
.landing-inner {
    display: flex; 
    flex-direction: column; 
    align-items: center;
    justify-content: center; 
    gap: 2vh; 
    height: 100%; 
    width: 100%; 
    padding: 0 28px;
}
.brand { text-align:center; margin-bottom: 10px; }
.brand-icon svg { width:52px; height:52px; }
.brand-name {
    font-family: var(--mono);
    font-size: 2.4rem; font-weight:700;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-sub { font-size:0.7rem; opacity:0.4; letter-spacing:0.2em; text-transform:uppercase; }

.landing-actions { width:100%; display:flex; flex-direction:column; gap:12px; }
.action-btn {
    width: 100%; 
    padding: 18px 24px;
    border-radius: 18px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    color: var(--text);
    font-family: var(--sans); 
    font-size: 0.9rem; 
    font-weight: 600;
    letter-spacing: 0.06em; 
    text-transform: uppercase;
    cursor: pointer;
    display: flex; 
    align-items: center; 
    gap: 16px; 
    transition: 0.2s;
}

.action-icon { width: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.action-icon svg { width: 24px; height: 24px; fill: white; opacity: 0.9; }

.landing-qr {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 1.2s ease-out forwards;
}
.qr-wrap { 
    background: white; 
    padding: 6px; 
    border-radius: 12px; 
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
}
.qr-wrap img { width: 90px; height: 90px; display: block; border-radius: 4px; }

/* ── SHARED PAGE CHROME ── */
.page-header { width:100%; padding: 6vh 24px 0; flex-shrink:0; }
.page-title {
    font-size:1.1rem; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    opacity:0.9; margin-bottom:20px; text-align:center;
}

/* ── GLASS SELECT ── */
.g-select {
    width:100%; padding:16px 20px;
    border-radius:14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    color: white; font-family:var(--sans); font-size:1rem;
    outline:none; appearance:none; cursor:pointer;
}
option { background:#111827; color:white; }

/* ── MONITOR ── */
.monitor-body {
    width:100%; padding:0 20px;
    display:flex; flex-direction:column; gap:16px;
    flex:1; min-height:0;
}
.pids-board {
    background:#000; border:2px solid #222; border-radius:12px;
    overflow:hidden; flex:1; min-height:0; display:flex; flex-direction:column;
}
.pids-head {
    display:grid; grid-template-columns:80px 1fr 72px;
    padding:10px 16px; background:#111; border-bottom:1px solid #222;
    font-family:var(--mono); font-size:0.65rem; color:rgba(255,255,255,0.35);
}
.pids-rows { overflow-y:auto; flex:1; }
.pids-row {
    display:grid; grid-template-columns:80px 1fr 72px;
    padding:14px 16px; border-bottom:1px solid #111;
    font-family:var(--mono); align-items:center;
    animation: fadeRow 0.4s ease;
}

/* Add these three rules right here: */
.pids-id { font-size: 0.7rem; color: var(--dim); }
.pids-dir { font-weight: 700; color: white; text-align: center; }
.pids-time { font-weight: 700; color: var(--yellow); text-align: right; }

/* ── PLANNER ── */
.planner-body { width:100%; padding:0 20px; display:flex; flex-direction:column; gap:12px; flex:1; min-height:0; overflow:hidden; }

.line-selector { display:flex; gap:10px; }

.line-btn {
    flex:1; padding:14px; border-radius:14px; border:2px solid transparent;
    background: var(--glass); color:white; font-family:var(--sans);
    font-size:0.85rem; font-weight:700; cursor:pointer; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:8px; transition:0.2s;
}
.line-dot { 
    width:12px; 
    height:12px; 
    border-radius:50%; 
    flex-shrink:0; 
}

.line-btn.active-l1 { border-color:var(--l1); background:rgba(192,57,43,0.2); }
.line-btn.active-l2 { border-color:var(--l2); background:rgba(26,111,196,0.2); }

.planner-selection-group { display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 12px; }
.inputs-stack { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.swap-btn {
    width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%;
    background: var(--glass); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
}

/* ── NEW RESULTS LAYOUT ── */
.results-scroll { flex:1; overflow-y:auto; padding:10px 20px; display:flex; flex-direction:column; gap:10px; }

.result-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

/* Greyed out for departed trains */
.result-card.past { opacity: 0.6; filter: grayscale(0.3); }

.card-top {
    display: grid;
    grid-template-columns: 70px 1fr 70px; /* ID | Direction | Time */
    align-items: center;
    padding: 18px 16px;
    gap: 10px;
}

.card-id { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); }
.card-dest { font-weight: 700; font-size: 1.1rem; text-align: center; color: white; letter-spacing: 0.02em; }
.card-dep { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--yellow); text-align: right; }

/* Itinerary (The expandable part) */
.itinerary {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(0,0,0,0.2);
}

.result-card.expanded .itinerary { 
    max-height: 1000px; 
    border-top: 1px solid var(--glass-border); 
}

.itin-inner { padding: 20px; position: relative; margin-left: 10px; }

/* The vertical line on the left */
.itin-inner::before {
    content: '';
    position: absolute;
    left: 25px; top: 25px; bottom: 25px;
    width: 2px; background: rgba(255,255,255,0.1);
}

.itin-stop {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    position: relative;
}

.stop-name { margin-left: 40px; font-size: 0.9rem; flex: 1; }
.stop-time { font-family: var(--mono); font-size: 0.85rem; color: var(--dim); }

/* Navigation Dots */
.stop-dot {
    position: absolute;
    left: 2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #444;
    z-index: 2;
}

.dot-past { background: var(--l1); } /* Red for arrived */
.dot-future { background: #555; }

/* Green Pulsating Dot */
.dot-current {
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.7);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.7); }
    70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(61, 220, 132, 0); }
    100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(61, 220, 132, 0); }
}

/* ── NAV BAR ── */
.nav-bar {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    width:calc(100% - 48px); max-width:320px; height:66px;
    background:rgba(10,12,20,0.85); backdrop-filter:blur(30px);
    border:1px solid var(--glass-border); border-radius:33px;
    display:flex; justify-content:space-around; align-items:center; z-index:9999;
}
.nav-btn { width:54px; height:54px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:50%; }
.nav-btn svg { width:24px; height:24px; fill:rgba(255,255,255,0.35); }
.nav-btn.active svg { fill:white; filter:drop-shadow(0 0 6px rgba(255,255,255,0.5)); }

/* ── ANIMATIONS (Correctly Placed) ── */
@keyframes meshMove {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); }
    50% { transform: translate(-10%, 15%) rotate(90deg) scale(1.2); }
    100% { transform: translate(10%, -15%) rotate(180deg) scale(1); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeRow { 
    from { opacity:0; transform:translateX(-8px); } 
    to { opacity:1; transform:translateX(0); } 
}
</style>
</head>

 <div class="planner-selection-group">

<script>
// ════════════════════════════════════════════════
//  DATA — trains loaded from trains.json
// ════════════════════════════════════════════════
let ALL_TRAINS = [];

async function loadData() {
    const res = await fetch('trains.json');
    ALL_TRAINS = await res.json();
    buildMonitorPicker();
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
// Strip (Arr)/(Dep) suffixes so station names match across lines
function norm(name) {
    return name.replace(/\s*\((Arr|Dep)\)\s*$/i, '').trim();
}

function nowHHMM() {
    return new Date().toTimeString().slice(0, 5);
}

function toMin(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
}

function diffMin(t1, t2) {
    return toMin(t2) - toMin(t1);
}

// Find a stop in a train by normalised station name
function findStop(train, stNorm) {
    return train.stops.find(s => norm(s.station) === stNorm) || null;
}

// ════════════════════════════════════════════════
//  NAVIGATION STATE
// ════════════════════════════════════════════════
let currentPage = 'landing'; // 'landing' | 'monitor' | 'planner'

function showPage(name) {
    ['landing','monitor','planner'].forEach(p => {
        const el = document.getElementById('page-' + p);
        if (p === name) { el.classList.add('visible'); el.classList.remove('hidden-back'); }
        else            { el.classList.remove('visible'); el.classList.add('hidden-back'); }
    });
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const map = { landing:'nav-home', monitor:'nav-mon', planner:'nav-plan' };
    document.getElementById(map[name]).classList.add('active');
    currentPage = name;
}

function goHome() {
    resetMonitor();
    resetPlanner();
    showPage('landing');
}

function goMonitor()  { showPage('monitor'); }
function goPlanner()  { showPage('planner'); }

function navMonitor() {
    if (currentPage === 'monitor') resetMonitor();
    else goMonitor();
}
function navPlanner() {
    if (currentPage === 'planner') resetPlanner();
    else goPlanner();
}

// ════════════════════════════════════════════════
//  MONITOR
// ════════════════════════════════════════════════
function buildMonitorPicker() {
    // Only stations that are NOT the last stop on every train serving them
    const monSet = new Set();
    ALL_TRAINS.forEach(t => {
        t.stops.forEach((s, i) => {
            if (i < t.stops.length - 1) monSet.add(norm(s.station));
        });
    });
    const el = document.getElementById('mon-station');
    [...monSet].sort().forEach(s => el.add(new Option(s, s)));
}

function resetMonitor() {
    document.getElementById('mon-station').value = '';
    document.getElementById('pids-board').style.display = 'none';
    document.getElementById('pids-rows').innerHTML = '';
}

function renderPIDS() {
    const station = document.getElementById('mon-station').value;
    if (!station) return;

    const now = nowHHMM();
    // One result per direction: the next upcoming departure
    const byDir = {};

    ALL_TRAINS.forEach(t => {
        const stop = findStop(t, station);
        if (!stop) return;
        if (norm(t.direction) === station) return; // terminal — skip
        if (stop.departure <= now) return;          // already departed

        const dir = norm(t.direction);
        if (!byDir[dir] || stop.departure < byDir[dir].dep) {
            byDir[dir] = { id: t.train_id, dir, dep: stop.departure };
        }
    });

    const rows = Object.values(byDir).sort((a, b) => a.dep.localeCompare(b.dep));
    const board = document.getElementById('pids-board');
    const body  = document.getElementById('pids-rows');

    board.style.display = 'flex';

    if (!rows.length) {
        body.innerHTML = '<div class="pids-empty">Нема планираних полазака.</div>';
        return;
    }

body.innerHTML = rows.map(r => `
        <div class="pids-row">
            <span class="pids-id">${r.id}</span>
            <span class="pids-dir">${r.dir}</span>
            <span class="pids-time">${r.dep}</span>
        </div>
    `).join('');
}

// ════════════════════════════════════════════════
//  PLANNER
// ════════════════════════════════════════════════
let selectedLine = 0; // 0=none, 1=L1, 2=L2

function selectLine(n) {
    selectedLine = n;
    document.getElementById('btn-l1').className = 'line-btn' + (n===1 ? ' active-l1' : '');
    document.getElementById('btn-l2').className = 'line-btn' + (n===2 ? ' active-l2' : '');

    // Populate pickers with stations on this line only
    const lineKey = n === 1 ? 'BG:voz 1' : 'BG:voz 2';
    const stSet = new Set();
    ALL_TRAINS.filter(t => t.line === lineKey)
              .forEach(t => t.stops.forEach(s => stSet.add(norm(s.station))));
    const sorted = [...stSet].sort();

    ['plan-from','plan-to'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        const placeholder = id === 'plan-from' ? 'Полазиште' : 'Одредиште';
        el.add(new Option(placeholder, '', true, true));
        el.options[0].disabled = true;
        sorted.forEach(s => el.add(new Option(s, s)));
        el.disabled = false;
    });

    document.getElementById('plan-results').innerHTML = '';
}

function resetPlanner() {
    selectedLine = 0;
    document.getElementById('btn-l1').className = 'line-btn';
    document.getElementById('btn-l2').className = 'line-btn';
    ['plan-from','plan-to'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        const placeholder = id === 'plan-from' ? 'Полазиште' : 'Одредиште';
        el.add(new Option(placeholder, '', true, true));
        el.options[0].disabled = true;
        el.disabled = true;
    });
    document.getElementById('plan-results').innerHTML = '';
}

function swapStations() {
    const f = document.getElementById('plan-from');
    const t = document.getElementById('plan-to');
    const tmp = f.value; f.value = t.value; t.value = tmp;
    onPickersChange();
}

function onPickersChange() {
    const from = document.getElementById('plan-from').value;
    const to = document.getElementById('plan-to').value;
    // Show results immediately if both stations are selected
    if (from && to && from !== to) {
        renderPlanResults();
    } else {
        document.getElementById('plan-results').innerHTML = '';
    }
}

function renderPlanResults() {
    const from = document.getElementById('plan-from').value;
    const to = document.getElementById('plan-to').value;
    const lineKey = selectedLine === 1 ? 'BG:voz 1' : 'BG:voz 2';
    const now = nowHHMM();
    const container = document.getElementById('plan-results');
    container.innerHTML = '';

    // 1. Filter ALL trains for the day that hit both stations in the right order
    const all = ALL_TRAINS.filter(t => {
        const fs = findStop(t, from);
        const ts = findStop(t, to);
        return t.line === lineKey && fs && ts && t.stops.indexOf(fs) < t.stops.indexOf(ts);
    }).sort((a, b) => {
        // 2. Sort by departure time (00:00 to 23:59)
        return findStop(a, from).departure.localeCompare(findStop(b, from).departure);
    });

    if (!all.length) {
        container.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5">Нема полазака.</div>';
        return;
    }

    all.forEach(t => {
        const depStop = findStop(t, from);
        const arrStop = findStop(t, to);
        const isPast = depStop.departure < now; // Card is grey if it already left
        
        const card = document.createElement('div');
        card.className = `result-card ${isPast ? 'past' : ''}`;
        
        // 3. Build the "Map Navigation" Itinerary
        let itinHtml = '';
        const relevantStops = t.stops.slice(t.stops.indexOf(depStop), t.stops.indexOf(arrStop) + 1);
        
        // Find current train position based on time
        let currentIdx = -1;
        relevantStops.forEach((s, idx) => {
            if (s.departure <= now) currentIdx = idx;
        });

        relevantStops.forEach((s, idx) => {
            let dotClass = 'dot-future';
            if (idx < currentIdx) {
                dotClass = 'dot-past'; // Red (passed)
            } else if (idx === currentIdx) {
                // If reached destination, it's red. If still moving, it's green pulsating.
                dotClass = (idx === relevantStops.length - 1) ? 'dot-past' : 'dot-current';
            }

            itinHtml += `
                <div class="itin-stop">
                    <div class="stop-dot ${dotClass}"></div>
                    <span class="stop-name">${norm(s.station)}</span>
                    <span class="stop-time">${s.departure}</span>
                </div>
            `;
        });

        // 4. Card Header: ID | DIRECTION (Bold) | TIME
        card.innerHTML = `
            <div class="card-top">
                <div class="card-id">${t.train_id}</div>
                <div class="card-dest">${norm(t.direction)}</div>
                <div class="card-dep">${depStop.departure}</div>
            </div>
            <div class="itinerary">
                <div class="itin-inner">${itinHtml}</div>
            </div>
        `;

        // 5. Expand logic: Only one card open at a time
        card.addEventListener('click', () => {
            const isExp = card.classList.contains('expanded');
            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('expanded'));
            if (!isExp) card.classList.add('expanded');
        });

        container.appendChild(card);
    });
}
