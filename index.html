<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BG:VOZ Live</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-blur: blur(25px);
            --accent-yellow: #FFD700;
            --accent-orange: #FF9500; /* Line 2/4 Resnik */
            --accent-blue: #007AFF;   /* Line 1 Batajnica */
            --accent-red: #FF3B30;    /* Line 3 Mladenovac/Lazarevac */
            --accent-green: #4CD964;  /* Live Dot */
            --text-main: #FFFFFF;
            --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-ios);
            color: var(--text-main);
            height: 100vh; width: 100vw; overflow: hidden;
            background: #050a14;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s ease; padding-top: 60px; padding-bottom: 100px;
            opacity: 0; pointer-events: none; overflow-y: auto;
        }
        .page.active { opacity: 1; pointer-events: auto; }

        /* Planner UI */
        .plan-controls { width: 100%; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); position: relative; }
        .plan-select { width: 100%; padding: 18px; background: transparent; border: none; color: white; font-size: 1rem; outline: none; appearance: none; }
        .divider { height: 1px; background: var(--glass-border); margin: 0 16px; }

        /* Trip Cards */
        .trip-card { background: var(--glass-bg); margin: 10px 20px; border-radius: 18px; border: 1px solid var(--glass-border); transition: 0.3s; }
        .trip-summary { padding: 15px; display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; cursor: pointer; }
        .t-time { font-family: monospace; font-weight: bold; font-size: 1.1rem; color: var(--accent-yellow); }
        .t-info { text-align: center; font-size: 0.8rem; font-weight: 600; }
        .t-arr { text-align: right; opacity: 0.7; font-family: monospace; }
        
        .line-tag { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; color: white; }
        .l1 { background: var(--accent-red); } /* Red on map */
        .l2 { background: var(--accent-blue); } /* Blue on map */
        .l4 { background: var(--accent-yellow); color: black; }

        .trip-details { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; background: rgba(0,0,0,0.2); }
        .trip-card.expanded .trip-details { max-height: 1000px; padding: 15px; }

        /* Itinerary Timeline */
        .itinerary { position: relative; margin-left: 20px; border-left: 2px solid rgba(255,255,255,0.2); padding-left: 20px; }
        .stop { position: relative; margin-bottom: 15px; font-size: 0.9rem; }
        .stop::before { content: ''; position: absolute; left: -26px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #555; border: 2px solid #000; }
        .stop.active-stop::after {
            content: ''; position: absolute; left: -26px; top: 4px; width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        
        .transfer-note { background: rgba(255,255,255,0.1); padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 0.75rem; border-left: 4px solid var(--accent-yellow); }

        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 65px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--glass-border); }
        .nav-item { color: white; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); }
    </style>
</head>
<body>

<div id="home-page" class="page active">
    <h1>BG:VOZ</h1>
    <div style="margin-top: 40px; width: 100%; padding: 0 20px;">
        <div class="input-group" style="padding: 20px; text-align: center; cursor: pointer;" onclick="goTo('plan')">
            START PLANNING
        </div>
    </div>
</div>

<div id="plan-page" class="page">
    <div class="plan-controls">
        <div class="input-group">
            <select id="fromPicker" class="plan-select" onchange="runPlanner()">
                <option value="" disabled selected>Polazak</option>
            </select>
            <div class="divider"></div>
            <select id="toPicker" class="plan-select" onchange="runPlanner()">
                <option value="" disabled selected>Dolazak</option>
            </select>
        </div>
    </div>
    <div id="plannerResults" style="width: 100%; margin-top: 20px;"></div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="goTo('home')">HOME</div>
    <div class="nav-item" id="nav-plan" onclick="goTo('plan')">PLANNER</div>
</nav>

<script>
// Logic configuration based on your description
const STATIONS = [
    "Batajnica", "Kamendin", "Zemun Polje", "Altina", "Zemun", "Tošin Bunar", 
    "Novi Beograd", "Beograd Centar", "Karađorđev Park", "Vukov Spomenik", 
    "Pančevački Most", "Krnjača Most", "Krnjača", "Sebeš", "Ovča",
    "Resnik", "Kijevo", "Kneževac", "Rakovica"
];

const LINES = {
    "L1": ["Batajnica", "Kamendin", "Zemun Polje", "Altina", "Zemun", "Tošin Bunar", "Novi Beograd", "Beograd Centar", "Karađorđev Park", "Vukov Spomenik", "Pančevački Most", "Krnjača Most", "Krnjača", "Sebeš", "Ovča"],
    "L2": ["Resnik", "Kijevo", "Kneževac", "Rakovica", "Karađorđev Park", "Vukov Spomenik", "Pančevački Most", "Krnjača Most", "Krnjača", "Sebeš", "Ovča"],
    "L4": ["Resnik", "Kijevo", "Kneževac", "Rakovica", "Beograd Centar", "Novi Beograd", "Tošin Bunar", "Zemun"]
};

// Mock train data for demonstration (In production, this loads from trains.json)
let trainData = [
    { train_id: "7100", line: "L1", direction: "Ovča", stops: generateStops("L1", "08:00") },
    { train_id: "7101", line: "L1", direction: "Batajnica", stops: generateStops([...LINES.L1].reverse(), "08:15") },
    { train_id: "8100", line: "L2", direction: "Ovča", stops: generateStops("L2", "08:10") },
    { train_id: "4100", line: "L4", direction: "Zemun", stops: generateStops("L4", "08:20") }
];

function generateStops(lineKey, startTime) {
    const stations = Array.isArray(lineKey) ? lineKey : LINES[lineKey];
    let currentMin = timeToMin(startTime);
    return stations.map((s, i) => {
        const arrival = minToTime(currentMin);
        currentMin += 3; // 3 mins between stations
        return { station: s, arrival, departure: arrival };
    });
}

function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
function minToTime(m) { 
    const h = Math.floor(m / 60) % 24; 
    const min = m % 60; 
    return `${h.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;
}

function runPlanner() {
    const from = document.getElementById('fromPicker').value;
    const to = document.getElementById('toPicker').value;
    if (!from || !to || from === to) return;

    const results = [];
    const nowMin = timeToMin(new Date().getHours() + ":" + new Date().getMinutes());

    // 1. Check for direct trains
    trainData.forEach(train => {
        const sIdx = train.stops.findIndex(s => s.station === from);
        const eIdx = train.stops.findIndex(s => s.station === to);
        if (sIdx !== -1 && eIdx !== -1 && sIdx < eIdx) {
            results.push({ type: 'direct', train, depStop: train.stops[sIdx], arrStop: train.stops[eIdx], fullStops: train.stops.slice(sIdx, eIdx + 1) });
        }
    });

    // 2. Check for transfers if no direct (Simplified Hub Logic)
    if (results.length === 0) {
        const hubs = ["Beograd Centar", "Rakovica", "Karađorđev Park"];
        hubs.forEach(hub => {
            if (from === hub || to === hub) return;
            // Find leg 1
            trainData.forEach(t1 => {
                const s1 = t1.stops.findIndex(s => s.station === from);
                const h1 = t1.stops.findIndex(s => s.station === hub);
                if (s1 !== -1 && h1 !== -1 && s1 < h1) {
                    // Find leg 2 starting after leg 1 arrives
                    trainData.forEach(t2 => {
                        const h2 = t2.stops.findIndex(s => s.station === hub);
                        const e2 = t2.stops.findIndex(s => s.station === to);
                        if (h2 !== -1 && e2 !== -1 && h2 < e2) {
                            const waitTime = timeToMin(t2.stops[h2].departure) - timeToMin(t1.stops[h1].arrival);
                            if (waitTime >= 2 && waitTime < 60) {
                                results.push({ type: 'transfer', leg1: t1, leg2: t2, hub, depStop: t1.stops[s1], arrStop: t2.stops[e2] });
                            }
                        }
                    });
                }
            });
        });
    }

    renderResults(results);
}

function renderResults(results) {
    const container = document.getElementById('plannerResults');
    if (results.length === 0) {
        container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Nema dostupnih linija.</p>";
        return;
    }

    container.innerHTML = results.map((res, idx) => {
        const isDirect = res.type === 'direct';
        return `
            <div class="trip-card" id="card-${idx}">
                <div class="trip-summary" onclick="toggleCard(${idx})">
                    <div class="t-time">${res.depStop.departure}</div>
                    <div class="t-info">
                        <span class="line-tag ${isDirect ? res.train.line.toLowerCase() : 'l1'}">${isDirect ? res.train.line : 'TRANS'}</span>
                        <br><small>${isDirect ? 'Direktno' : 'Presedanje: ' + res.hub}</small>
                    </div>
                    <div class="t-arr">${res.arrStop.arrival}</div>
                </div>
                <div class="trip-details">
                    <div class="itinerary">
                        ${renderItinerary(res)}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function renderItinerary(res) {
    const nowMin = timeToMin(new Date().getHours() + ":" + new Date().getMinutes());
    let html = "";
    
    if (res.type === 'direct') {
        res.fullStops.forEach(s => {
            const isCurrent = isTrainAtStation(s.departure, nowMin);
            html += `<div class="stop ${isCurrent ? 'active-stop' : ''}">
                        <b>${s.departure}</b> ${s.station}
                     </div>`;
        });
    } else {
        html += `<div class="transfer-note">Voz ${res.leg1.train_id} ka stanici ${res.leg1.direction}</div>`;
        // Leg 1 and Leg 2 logic similar...
        html += `<div class="stop"><b>${res.depStop.departure}</b> ${res.depStop.station}</div>`;
        html += `<div class="stop"><b>${res.leg1.stops.find(s=>s.station===res.hub).arrival}</b> ${res.hub} (Dolazak)</div>`;
        html += `<div class="transfer-note">Presedanje na ${res.leg2.train_id} ka ${res.leg2.direction}</div>`;
        html += `<div class="stop"><b>${res.arrStop.arrival}</b> ${res.arrStop.station}</div>`;
    }
    return html;
}

function isTrainAtStation(stopTime, nowMin) {
    const sMin = timeToMin(stopTime);
    return nowMin >= sMin && nowMin < sMin + 2; 
}

function toggleCard(idx) {
    const all = document.querySelectorAll('.trip-card');
    all.forEach((c, i) => {
        if (i === idx) c.classList.toggle('expanded');
        else c.classList.remove('expanded');
    });
}

function populatePickers() {
    const html = STATIONS.sort().map(s => `<option value="${s}">${s}</option>`).join('');
    document.getElementById('fromPicker').innerHTML += html;
    document.getElementById('toPicker').innerHTML += html;
}

function goTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page + '-page').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + page).classList.add('active');
}

document.addEventListener('DOMContentLoaded', populatePickers);
</script>
</body>
</html>
