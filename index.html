<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BG:VOZ Live</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.18);
            --glass-blur: blur(25px);
            --accent-yellow: #FFD700;
            --accent-orange: #FF9500;
            --accent-blue: #007AFF;
            --accent-red: #FF3B30;
            --accent-green: #4CD964;
            --text-main: #FFFFFF;
            --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        /* --- YOUR ORIGINAL STYLING --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-ios);
            color: var(--text-main);
            height: 100vh; width: 100vw; overflow: hidden;
            background: linear-gradient(-45deg, #050a14, #1a0505, #0a1428, #140514);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 80px; padding-bottom: 120px;
            opacity: 0; pointer-events: none; transform: scale(1.1);
            overflow-y: auto;
        }
        .page.active { opacity: 1; pointer-events: auto; transform: scale(1); }

        /* PIDS BOARD */
        .pids-board { width: 100%; background: #000; border: 1px solid #222; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        .pids-header, .pids-row { display: grid; grid-template-columns: 70px 1fr 100px; padding: 12px 15px; align-items: center; }
        .pids-header { background: #111; border-bottom: 1px solid #222; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: #FFFFFF; letter-spacing: 0.05em; }
        .pids-row { padding: 18px 15px; border-bottom: 1px solid #111; }
        .col-vnum { text-align: left; color: #666; font-family: monospace; font-size: 0.85rem; }
        .col-dir { text-align: left; padding-left: 5px; color: var(--accent-yellow); font-weight: 700; font-size: 0.95rem; text-transform: uppercase; }
        .col-time { text-align: right; color: var(--accent-yellow); font-family: monospace; font-size: 1.2rem; font-weight: bold; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
        .nav-item { height: 100%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.4; transition: all 0.3s; cursor: pointer; flex: 1; }
        .nav-item.active { opacity: 1; }
        .nav-item svg { width: 28px; height: 28px; }

        /* Buttons & Controls */
        .top-section { text-align: center; margin-bottom: 30px; }
        .modern-train-icon { width: 64px; height: 64px; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; }
        .center-section { width: 100%; padding: 0 32px; display: flex; flex-direction: column; gap: 12px; }
        .btn-large { width: 100%; padding: 20px; font-size: 0.8rem; font-weight: 700; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg); text-transform: uppercase; text-align: center; cursor: pointer; }

        /* QR Styling */
        .qr-container { margin-top: 20px; display: flex; justify-content: center; width: 100%; }
.qr-card { 
    background: var(--glass-bg); 
    backdrop-filter: var(--glass-blur); 
    -webkit-backdrop-filter: var(--glass-blur); 
    border: 1px solid var(--glass-border); 
    padding: 12px; /* Reduced from 16px */
    border-radius: 24px; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    width: fit-content; /* Card shrinks to fit the image */
}        .qr-image { width: 110px; height: 110px; border-radius: 10px; filter: brightness(1.1); }
        

        /* PLANNER RESULTS ENHANCED */
        .plan-controls { width: 100%; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .input-group { background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; backdrop-filter: var(--glass-blur); }
        .plan-select { width: 100%; padding: 18px; background: transparent; border: none; color: white; font-size: 1rem; outline: none; appearance: none; }
        .swap-btn { position: absolute; right: 35px; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); z-index: 10; cursor: pointer; }

        .trip-card { background: var(--glass-bg); margin: 6px 20px; border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; transition: all 0.3s ease; }
        .trip-summary { padding: 18px 20px; display: grid; grid-template-columns: 70px 1fr 60px; align-items: center; cursor: pointer; gap: 10px; }
        .trip-time { font-family: monospace; font-weight: 800; font-size: 1.2rem; color: var(--accent-yellow); }
        .trip-dest { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; line-height: 1.2; }
        .trip-arr { font-family: monospace; font-size: 0.85rem; color: rgba(255,255,255,0.5); text-align: right; }

        .trip-details { max-height: 0; padding: 0 20px; opacity: 0; overflow: hidden; transition: all 0.4s ease; background: rgba(0,0,0,0.15); }
        .trip-card.expanded .trip-details { max-height: 1000px; padding: 20px; opacity: 1; border-top: 1px solid var(--glass-border); }

        /* Itinerary Dots */
        .stop-list { position: relative; padding-left: 20px; border-left: 2px solid rgba(255,255,255,0.1); margin: 10px 0; }
        .stop-row { position: relative; margin-bottom: 12px; font-size: 0.85rem; display: flex; justify-content: space-between; }
        .stop-row::before { content: ''; position: absolute; left: -26px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .stop-row.active-stop::after { 
            content: ''; position: absolute; left: -26px; top: 4px; width: 10px; height: 10px; border-radius: 50%; 
            background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        
        .transfer-badge { background: var(--accent-yellow); color: black; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; vertical-align: middle; margin-bottom: 4px; display: inline-block; }
        /* Fixed Header for PIDS */
.pids-labels {
    display: grid;
    grid-template-columns: 70px 1fr 100px;
    padding: 10px 15px;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    border-bottom: 1px solid #222;
}

/* Scrolling Napomena */
.napomena-container {
    background: #0a0a0a;
    padding: 10px 15px;
    border-top: 1px solid #222;
    font-size: 0.75rem;
    overflow: hidden;
    white-space: nowrap;
}
.napomena-label { color: var(--accent-yellow); font-weight: bold; margin-right: 10px; }
.marquee {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 15s linear infinite;
    color: #fff;
}
@keyframes marquee {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
}

/* Planner Duration & Past Trips */
.trip-duration { font-size: 0.7rem; opacity: 0.6; color: #fff; }
.past-trip { 
    opacity: 0.5; 
    filter: grayscale(1) brightness(0.7); 
    border: 1px dashed rgba(255,255,255,0.1); /* Makes it look "expired" */
}
    </style>
</head>
<body>

<div id="home-page" class="page active">
    <header class="top-section">
        <svg class="modern-train-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="5" y="2" width="14" height="16" rx="3"/><line x1="5" y1="12" x2="19" y2="12"/>
            <circle cx="9" cy="15" r="1" fill="white"/><circle cx="15" cy="15" r="1" fill="white"/>
        </svg>
        <h1>BG:VOZ</h1>
    </header>
    <main class="center-section">
        <div class="btn-large" onclick="goTo('monitor')">STANIČNI RED VOŽNJE</div>
        <div class="btn-large" onclick="goTo('plan')">PLANIRAJ PUTOVANJE</div>
        <div class="qr-container">
    <div class="qr-card">
        <img id="pwa-qr" src="" alt="PWA" class="qr-image">
    </div>
</div>
    </main>
</div>

<div id="monitor-page" class="page">
    <div class="plan-controls">
        <div class="input-group">
            <select id="stationPicker" class="plan-select" onchange="updatePIDS(this.value)">
                <option value="" disabled selected>Izaberi stanicu</option>
            </select>
        </div>
    </div>
    <div id="pidsDisplay" style="display:none; width: 100%; padding: 0 20px; margin-top:15px;">
        <div class="pids-board">
            <div id="pidsBody"></div>
        </div>
    </div>
</div>

<div id="plan-page" class="page">
    <div id="stationPickers" style="width:100%;">
        <div class="plan-controls">
            <div class="input-group" style="position:relative;">
                <select id="fromPicker" class="plan-select" onchange="runPlanner()">
                    <option value="" disabled selected hidden>Polazak</option>
                </select>
                <div style="height:1px; background:var(--glass-border); margin:0 16px;"></div>
                <select id="toPicker" class="plan-select" onchange="runPlanner()">
                    <option value="" disabled selected hidden>Dolazak</option>
                </select>
                <button class="swap-btn" onclick="swapStations()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M7 16V4M7 4L3 8M7 4L11 8M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
                </button>
            </div>
        </div>
    </div>
    <div id="plannerResults" style="width: 100%; margin-top: 5px;"></div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="goTo('home')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
    </div>
    <div class="nav-item" id="nav-monitor" onclick="goTo('monitor')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    </div>
    <div class="nav-item" id="nav-plan" onclick="goTo('plan')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg>
    </div>
</nav>

<script>
let trainData = [];

const norm = (s) => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "dj").toLowerCase().trim() : "";

const timeToMin = (t) => {
    if (!t) return 0;
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
};

const getTimeNow = () => {
    const n = new Date();
    return n.getHours() * 60 + n.getMinutes();
};

async function loadTrainData() {
    try {
        const response = await fetch('trains.json');
        trainData = await response.json();
        const stationSet = new Set();
        trainData.forEach(t => t.stops.forEach(s => stationSet.add(s.station)));
        const sortedStations = Array.from(stationSet).sort();
        const options = `<option value="" disabled selected>Izaberi stanicu...</option>` + 
                sortedStations.map(s => `<option value="${s}">${s}</option>`).join('');
        document.querySelectorAll('#stationPicker, #fromPicker, #toPicker').forEach(el => el.innerHTML = options);
    } catch (e) { console.error("Error loading JSON", e); }
}

// --- PIDS LOGIC ---
function updatePIDS(selectedStation) {
    const nowMin = getTimeNow();
    let directions = {};

    trainData.forEach(train => {
        if (norm(train.direction) === norm(selectedStation)) return;

        const stop = train.stops.find(s => norm(s.station) === norm(selectedStation));
        if (stop) {
            const depMin = timeToMin(stop.departure);
            if (depMin >= nowMin - 2) {
                if (!directions[train.direction] || depMin < directions[train.direction].min) {
                    directions[train.direction] = {
                        id: train.train_id,
                        dir: train.direction,
                        time: stop.departure,
                        min: depMin,
                        napomena: train.napomena || ""
                    };
                }
            }
        }
    });

    const results = Object.values(directions).sort((a,b) => a.min - b.min);
    const pidsBody = document.getElementById('pidsBody');
    
    let html = `<div class="pids-labels"><span>Broj</span><span>Smer</span><span style="text-align:right">Vreme</span></div>`;
    
    if (results.length > 0) {
        html += results.map(d => `
            <div class="pids-row">
                <div class="col-vnum">${d.id}</div>
                <div class="col-dir">${d.dir}</div>
                <div class="col-time">${d.time.replace(':', '<span class="blink">:</span>')}</div>
            </div>
        `).join('');

        // Updated Napomena Logic: Only show the div if a message actually exists
        const mainNapomena = results[0].napomena; 
        if (mainNapomena && mainNapomena.trim() !== "") {
            html += `
                <div class="napomena-container">
                    <span class="napomena-label">NAPOMENA:</span>
                    <span class="marquee">${mainNapomena}</span>
                </div>`;
        }
    } else {
        html += '<div style="padding:20px; text-align:center; opacity:0.5;">Nema planiranih polazaka.</div>';
    }

    document.getElementById('pidsDisplay').style.display = 'block';
    pidsBody.innerHTML = html;
}

// --- NEW PLANNER LOGIC (Safe & Isolated) ---
function runPlanner() {
    const from = document.getElementById('fromPicker').value;
    const to = document.getElementById('toPicker').value;
    if (!from || !to) return;

    let routes = [];
    const nowMin = getTimeNow();

    // 1. Direct routes check (Unchanged)
    trainData.forEach(train => {
        const sIdx = train.stops.findIndex(s => norm(s.station) === norm(from));
        const eIdx = train.stops.findIndex(s => norm(s.station) === norm(to));
        
        if (sIdx !== -1 && eIdx !== -1 && sIdx < eIdx) {
            routes.push({
                type: 'direct',
                train: train,
                dep: train.stops[sIdx].departure,
                arr: train.stops[eIdx].arrival,
                duration: timeToMin(train.stops[eIdx].arrival) - timeToMin(train.stops[sIdx].departure),
                stops: train.stops.slice(sIdx, eIdx + 1),
                depMin: timeToMin(train.stops[sIdx].departure)
            });
        }
    });

    // 2. Transfer logic (Only if direct routes are limited)
    if (routes.length < 5) {
        const hubs = ["Zemun", "Novi Beograd", "Beograd Centar (Prokop)", "Karađorđev park"];
        
        trainData.forEach(t1 => {
            const sIdx = t1.stops.findIndex(s => norm(s.station) === norm(from));
            if (sIdx === -1) return;

            hubs.forEach(hubName => {
                const hIdx1 = t1.stops.findIndex(s => norm(s.station) === norm(hubName));
                if (hIdx1 !== -1 && sIdx < hIdx1) {
                    const arrivalAtHub = t1.stops[hIdx1].arrival;
                    const minAtHub = timeToMin(arrivalAtHub);

                    trainData.forEach(t2 => {
                        if (t1.train_id === t2.train_id) return;
                        const hIdx2 = t2.stops.findIndex(s => norm(s.station) === norm(hubName));
                        const eIdx2 = t2.stops.findIndex(s => norm(s.station) === norm(to));

                        if (hIdx2 !== -1 && eIdx2 !== -1 && hIdx2 < eIdx2) {
                            const minDepHub = timeToMin(t2.stops[hIdx2].departure);
                            // Transfer window: 5 to 45 minutes
                            if (minDepHub >= minAtHub + 5 && minDepHub <= minAtHub + 45) {
                                routes.push({
                                    type: 'transfer',
                                    train1: t1,
                                    train2: t2,
                                    hub: hubName,
                                    dep: t1.stops[sIdx].departure,
                                    arr: t2.stops[eIdx2].arrival,
                                    duration: timeToMin(t2.stops[eIdx2].arrival) - timeToMin(t1.stops[sIdx].departure),
                                    depMin: timeToMin(t1.stops[sIdx].departure)
                                });
                            }
                        }
                    });
                }
            });
        });
    }

    routes.sort((a,b) => a.depMin - b.depMin);
    // Remove duplicates (same departure and arrival)
    const unique = routes.filter((v,i,a) => a.findIndex(t => t.dep === v.dep && t.arr === v.arr) === i);
    renderPlanner(unique.slice(0, 15), nowMin);
}
// --- NEW RENDERER (Clean & Mobile Friendly) ---
function renderPlanner(routes, nowMin) {
    const container = document.getElementById('plannerResults');
    if (routes.length === 0) {
        container.innerHTML = '<div style="padding:40px; text-align:center; opacity:0.5;">Nema pronađenih veza.</div>';
        return;
    }

    container.innerHTML = routes.map((r, idx) => {
        const isPast = r.depMin < nowMin;
        const isTransfer = r.type === 'transfer';
        
        // Safety math for duration
        const displayDuration = (r.duration && r.duration > 0) ? `${r.duration} min` : "---";
        const displayArr = r.arr || "--:--";

        return `
            <div class="trip-card ${isPast ? 'past-trip' : ''}" id="plan-${idx}">
                <div class="trip-summary" onclick="toggleCard('plan-${idx}')">
                    <div class="trip-time">${r.dep}</div>
                    <div class="trip-dest">
                        ${isTransfer ? `${r.train1.direction} ➔ ${r.train2.direction}` : r.train.direction}
                        <div class="trip-duration">
                            ${isTransfer ? `<span class="transfer-badge">${r.hub}</span> ` : ''}
                            Trajanje: ${displayDuration}
                        </div>
                    </div>
                    <div class="trip-arr" style="color:var(--accent-yellow)">${displayArr}</div>
                </div>
                <div class="trip-details">
                    <div class="stop-list">
                        ${isTransfer ? renderTransferStops(r, nowMin) : renderDirectStops(r.stops, nowMin)}
                    </div>
                </div>
            </div>`;
    }).join('');
}

// Helper for Direct Trains
function renderDirectStops(stops, nowMin) {
    return stops.map(s => {
        const stopTime = timeToMin(s.departure);
        const isActive = (nowMin >= stopTime && nowMin < stopTime + 2);
        return `
            <div class="stop-row ${isActive ? 'active-stop' : ''}">
                <span>${s.station}</span>
                <span>${s.departure || s.arrival}</span>
            </div>`;
    }).join('');
}

// Helper for Transfers (Shows both train segments)
function renderTransferStops(route, nowMin) {
    // Segment 1: From origin to Hub
    const sIdx1 = route.train1.stops.findIndex(s => norm(s.station) === norm(document.getElementById('fromPicker').value));
    const hIdx1 = route.train1.stops.findIndex(s => norm(s.station) === norm(route.hub));
    const firstLeg = route.train1.stops.slice(sIdx1, hIdx1 + 1);

    // Segment 2: From Hub to destination
    const hIdx2 = route.train2.stops.findIndex(s => norm(s.station) === norm(route.hub));
    const eIdx2 = route.train2.stops.findIndex(s => norm(s.station) === norm(document.getElementById('toPicker').value));
    const secondLeg = route.train2.stops.slice(hIdx2, eIdx2 + 1);

    return `
        <div style="color:var(--accent-yellow); font-size:0.7rem; margin-bottom:10px;">VOZ ${route.train1.train_id}</div>
        ${renderDirectStops(firstLeg, nowMin)}
        <div style="border-top:1px dashed var(--glass-border); margin:15px 0; padding-top:10px;">
            <div style="color:var(--accent-yellow); font-size:0.7rem; margin-bottom:10px;">PRESEDANJE (${route.hub}) ➔ VOZ ${route.train2.train_id}</div>
            ${renderDirectStops(secondLeg, nowMin)}
        </div>
    `;
}

function toggleCard(id) {
    const el = document.getElementById(id);
    const wasExp = el.classList.contains('expanded');
    document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('expanded'));
    if (!wasExp) el.classList.add('expanded');
}
    
function swapStations() {
    const from = document.getElementById('fromPicker');
    const to = document.getElementById('toPicker');
    const temp = from.value;
    from.value = to.value;
    to.value = temp;
    runPlanner();
}
    
function goTo(screen) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(screen + '-page').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + screen).classList.add('active');
}

function generateQRCode() {
    document.getElementById('pwa-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(window.location.href)}&color=ffffff&bgcolor=333333`;
}

document.addEventListener('DOMContentLoaded', () => { loadTrainData(); generateQRCode(); });
</script>
</body>
</html>
