
<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>БГ:воз</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #06080f;
    --l1: #c0392b;
    --l2: #1a6fc4;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --dim: rgba(255,255,255,0.4);
    --yellow: #f0c040;
    --green: #3ddc84;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh; width: 100vw;
    overflow: hidden;
    position: relative;
}

/* animated background mesh */
body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(192,57,43,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(26,111,196,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 70%);
    pointer-events:none;
}

/* ── PAGES ── */
.page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    z-index: 1;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;
    padding-bottom: 110px;
    overflow: hidden;
}
#page-landing { opacity:1; transform:translateY(0); }
#page-monitor { opacity:0; transform:translateY(100%); pointer-events:none; }
#page-planner { opacity:0; transform:translateY(100%); pointer-events:none; }
.page.visible { opacity:1 !important; transform:translateY(0) !important; pointer-events:all !important; }
.page.hidden-back { opacity:0 !important; pointer-events:none !important; }

/* ── LANDING ── */
.landing-inner {
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between;
    height: 100%; width: 100%; padding: 10vh 28px 20px;
}
.brand { text-align:center; }
.brand-icon { margin-bottom: 12px; }
.brand-icon svg { width:52px; height:52px; }
.brand-name {
    font-family: var(--mono);
    font-size: 2.6rem; font-weight:700;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-sub { font-size:0.75rem; opacity:0.4; letter-spacing:0.2em; text-transform:uppercase; margin-top:4px; }

.landing-actions { width:100%; display:flex; flex-direction:column; gap:14px; }
.action-btn {
    width:100%; padding:20px 24px;
    border-radius:18px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    color: var(--text);
    font-family: var(--sans); font-size:0.95rem; font-weight:600;
    letter-spacing:0.06em; text-transform:uppercase;
    cursor:pointer; text-align:left;
    display:flex; align-items:center; gap:14px;
    transition: background 0.2s, transform 0.1s;
}
.action-btn:active { transform:scale(0.97); }
.action-btn:hover { background: rgba(255,255,255,0.1); }
.action-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.action-icon svg { width:18px; height:18px; fill:white; }

.landing-qr { display:flex; flex-direction:column; align-items:center; gap:8px; }
.qr-wrap { background:white; padding:8px; border-radius:14px; }
.qr-wrap img { width:90px; height:90px; display:block; border-radius:8px; }
.qr-label { font-size:0.7rem; opacity:0.35; font-family:var(--mono); }

/* ── SHARED PAGE CHROME ── */
.page-header {
    width:100%; padding: 6vh 24px 0;
    flex-shrink:0;
}
.page-title {
    font-size:1.1rem; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    opacity:0.9; margin-bottom:20px; text-align:center;
}

/* ── GLASS SELECT ── */
.g-select {
    width:100%; padding:16px 20px;
    border-radius:14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    color: white; font-family:var(--sans); font-size:1rem;
    outline:none; appearance:none; cursor:pointer;
}
option { background:#111827; color:white; }

/* ── MONITOR ── */
.monitor-body {
    width:100%; padding:0 20px;
    display:flex; flex-direction:column; gap:16px;
    flex:1; min-height:0;
}

.pids-board {
    background:#000;
    border:2px solid #222;
    border-radius:12px;
    overflow:hidden;
    flex:1; min-height:0;
    display:flex; flex-direction:column;
}
.pids-head {
    display:grid; grid-template-columns:80px 1fr 72px;
    padding:10px 16px;
    background:#111;
    border-bottom:1px solid #222;
    font-family:var(--mono); font-size:0.65rem;
    letter-spacing:0.15em; text-transform:uppercase;
    color:rgba(255,255,255,0.35);
}
.pids-head span:last-child { text-align:right; }
.pids-rows { overflow-y:auto; flex:1; }
.pids-row {
    display:grid; grid-template-columns:80px 1fr 72px;
    padding:14px 16px;
    border-bottom:1px solid #111;
    font-family:var(--mono);
    align-items:center;
    animation: fadeRow 0.4s ease;
}
@keyframes fadeRow { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
.pids-id { font-size:0.75rem; color:rgba(255,255,255,0.45); }
.pids-dir { font-size:1rem; font-weight:700; color:var(--yellow); }
.pids-time { font-size:1rem; font-weight:700; color:var(--yellow); text-align:right; }
.pids-empty { padding:30px; text-align:center; color:rgba(255,255,255,0.3); font-size:0.9rem; }

/* ── PLANNER ── */
.planner-body {
    width:100%; padding:0 20px;
    display:flex; flex-direction:column; gap:12px;
    flex:1; min-height:0; overflow:hidden;
}

/* line selector */
.line-selector { display:flex; gap:10px; }
.line-btn {
    flex:1; padding:14px;
    border-radius:14px; border:2px solid transparent;
    background: var(--glass);
    color:white; font-family:var(--sans);
    font-size:0.85rem; font-weight:700;
    letter-spacing:0.06em; text-transform:uppercase;
    cursor:pointer; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:0.2s;
}
.line-btn:active { transform:scale(0.96); }
.line-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.line-btn.active-l1 { border-color:var(--l1); background:rgba(192,57,43,0.2); }
.line-btn.active-l2 { border-color:var(--l2); background:rgba(26,111,196,0.2); }

/* station row */
.station-row { display:flex; align-items:center; gap:10px; }
.station-row .g-select { flex:1; }
.swap-btn {
    width:44px; height:44px; flex-shrink:0;
    border-radius:50%; background:var(--glass);
    border:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:1.2rem;
    transition:0.2s;
}
.swap-btn:active { transform:rotate(180deg) scale(0.9); }

.prev-link {
    font-size:0.8rem; color:var(--yellow);
    text-align:center; cursor:pointer;
    display:none; padding:4px;
}

/* results */
.results-scroll {
    flex:1; min-height:0;
    overflow-y:auto;
    display:flex; flex-direction:column; gap:10px;
    padding-bottom:10px;
}
.result-card {
    border-radius:16px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    overflow:hidden; flex-shrink:0;
    cursor:pointer;
    transition:border-color 0.2s;
}
.result-card:active { border-color:rgba(255,255,255,0.3); }
.result-card.past { opacity:0.45; }

.card-top {
    padding:16px 20px;
    display:grid; grid-template-columns:90px 1fr;
    align-items:center; gap:0;
}
.card-left { border-right:1px solid rgba(255,255,255,0.1); padding-right:16px; }
.card-dep { font-family:var(--mono); font-size:1.35rem; font-weight:700; color:var(--yellow); line-height:1; }
.card-arr { font-family:var(--mono); font-size:0.8rem; color:var(--dim); margin-top:3px; }
.card-id  { font-family:var(--mono); font-size:0.7rem; color:var(--dim); margin-top:4px; }
.card-right { padding-left:16px; }
.card-dest { font-size:1.1rem; font-weight:700; line-height:1.2; }
.card-info { font-size:0.78rem; color:var(--dim); margin-top:3px; }
.card-transfer { font-size:0.75rem; color:#60c8ff; margin-top:3px; }

/* itinerary */
.itinerary {
    max-height:0; overflow:hidden;
    transition:max-height 0.4s cubic-bezier(0,1,0,1);
    background:rgba(0,0,0,0.25);
}
.result-card.expanded .itinerary { max-height:800px; }
.itin-inner { padding:16px 20px; display:flex; flex-direction:column; gap:0; }

.itin-stop {
    display:flex; align-items:center; gap:12px;
    padding:8px 0; position:relative;
    font-size:0.88rem;
}
.itin-stop:not(:last-child)::after {
    content:'';
    position:absolute; left:9px; top:26px;
    width:2px; height:calc(100% - 10px);
    background:rgba(255,255,255,0.12);
}
.stop-dot {
    width:20px; height:20px; border-radius:50%;
    flex-shrink:0; z-index:1;
    display:flex; align-items:center; justify-content:center;
    font-size:8px;
}
.stop-dot.past-dot   { background:rgba(255,75,75,0.3);  border:2px solid #ff4b4b; }
.stop-dot.current-dot{ background:rgba(61,220,132,0.3); border:2px solid var(--green); animation:pulse 1.5s infinite; }
.stop-dot.future-dot { background:rgba(96,200,255,0.2); border:2px solid #60c8ff; }
@keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(61,220,132,0.5); } 50%{ box-shadow:0 0 0 6px rgba(61,220,132,0); } }

.stop-name { flex:1; }
.stop-time { font-family:var(--mono); font-size:0.8rem; color:var(--dim); }

.itin-transfer-badge {
    margin:4px 0; padding:8px 12px;
    background:rgba(96,200,255,0.1);
    border:1px solid rgba(96,200,255,0.3);
    border-radius:8px; font-size:0.78rem; color:#60c8ff;
    display:flex; align-items:center; gap:8px;
}

.no-results { text-align:center; padding:40px 20px; color:var(--dim); font-size:0.9rem; line-height:1.7; }

/* ── NAV BAR ── */
.nav-bar {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    width:calc(100% - 48px); max-width:320px; height:66px;
    background:rgba(10,12,20,0.85);
    backdrop-filter:blur(30px);
    border:1px solid var(--glass-border);
    border-radius:33px;
    display:flex; justify-content:space-around; align-items:center;
    z-index:9999;
}
.nav-btn {
    width:54px; height:54px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; border-radius:50%;
    transition:0.25s;
}
.nav-btn svg { width:24px; height:24px; fill:rgba(255,255,255,0.35); transition:0.25s; }
.nav-btn.active svg { fill:white; filter:drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
</style>
</head>

<!-- ══ LANDING PAGE ══ -->
<div id="page-landing" class="page">
    <div class="landing-inner">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="6" width="36" height="30" rx="6" fill="none" stroke="white" stroke-width="2"/>
                    <line x1="8" y1="22" x2="44" y2="22" stroke="white" stroke-width="2" opacity="0.5"/>
                    <circle cx="17" cy="30" r="2.5" fill="white" opacity="0.8"/>
                    <circle cx="35" cy="30" r="2.5" fill="white" opacity="0.8"/>
                    <path d="M16 42 L14 36 M36 42 L38 36" stroke="white" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
                    <line x1="20" y1="42" x2="32" y2="42" stroke="white" stroke-width="2" opacity="0.3"/>
                </svg>
            </div>
            <div class="brand-name">БГ:ВОЗ</div>
            <div class="brand-sub">Београдски Воз</div>
        </div>

        <div class="landing-actions">
            <div class="action-btn" onclick="goMonitor()">
                <div class="action-icon" style="background:rgba(255,255,255,0.08)">
                    <svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg>
                </div>
                Станични Монитор
            </div>
            <div class="action-btn" onclick="goPlanner()">
                <div class="action-icon" style="background:rgba(255,255,255,0.08)">
                    <svg viewBox="0 0 24 24"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg>

        <div class="landing-qr">

                <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://mikimisha93.github.io/BG-VOZ/&margin=4" alt="QR">
            </div>
            <div class="qr-label">mikimisha93.github.io/BG-VOZ</div>
        </div>
    </div>
</div>

<!-- ══ MONITOR PAGE ══ -->
<div id="page-monitor" class="page">
    <div class="page-header">
        <div class="page-title">Станични Монитор</div>
    </div>
    <div class="monitor-body">
        <select id="mon-station" class="g-select" onchange="renderPIDS()">
            <option value="" disabled selected>Изаберите станицу...</option>
        </select>
        <div class="pids-board" id="pids-board" style="display:none">

                <span>Воз</span><span>Смер</span><span>Полазак</span>

        </div>
    </div>

<div id="page-planner" class="page">
    <div class="page-header">
        <div class="page-title">Планирај Путовање</div>
    </div>
    <div class="planner-body">

        <!-- Line selector -->
        <div class="line-selector">
            <div class="line-btn" id="btn-l1" onclick="selectLine(1)">
                <div class="line-dot" style="background:var(--l1)"></div>
                BG:воз 1
            </div>
            <div class="line-btn" id="btn-l2" onclick="selectLine(2)">
                <div class="line-dot" style="background:var(--l2)"></div>
                BG:воз 2
            </div>
        </div>

        <!-- Station pickers -->
        <div class="station-row">
            <select id="plan-from" class="g-select" onchange="onPickersChange()" disabled>
                <option value="" disabled selected>Полазиште</option>
            </select>
        </div>
        <div class="station-row">
            <select id="plan-to" class="g-select" onchange="onPickersChange()" disabled>
                <option value="" disabled selected>Одредиште</option>
            </select>
            <div class="swap-btn" onclick="swapStations()">⇄</div>
        </div>

        <div id="prev-link" class="prev-link" onclick="renderPlanResults(true)">▲ Прикажи претходне поласке</div>

        <div id="plan-results" class="results-scroll"></div>
    </div>
</div>

<!-- ══ NAV BAR ══ -->
<nav class="nav-bar">
    <div class="nav-btn active" id="nav-home" onclick="goHome()">
        <svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
    </div>
    <div class="nav-btn" id="nav-mon" onclick="navMonitor()">
        <svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg>
    </div>
    <div class="nav-btn" id="nav-plan" onclick="navPlanner()">
        <svg viewBox="0 0 24 24"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg>
    </div>
</nav>

<script>
// ════════════════════════════════════════════════
//  DATA — trains loaded from trains.json
// ════════════════════════════════════════════════
let ALL_TRAINS = [];

async function loadData() {
    const res = await fetch('trains.json');
    ALL_TRAINS = await res.json();
    buildMonitorPicker();
}

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
// Strip (Arr)/(Dep) suffixes so station names match across lines
function norm(name) {
    return name.replace(/\s*\((Arr|Dep)\)\s*$/i, '').trim();
}

function nowHHMM() {
    return new Date().toTimeString().slice(0, 5);
}

function toMin(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
}

function diffMin(t1, t2) {
    return toMin(t2) - toMin(t1);
}

// Find a stop in a train by normalised station name
function findStop(train, stNorm) {
    return train.stops.find(s => norm(s.station) === stNorm) || null;
}

// ════════════════════════════════════════════════
//  NAVIGATION STATE
// ════════════════════════════════════════════════
let currentPage = 'landing'; // 'landing' | 'monitor' | 'planner'

function showPage(name) {
    ['landing','monitor','planner'].forEach(p => {
        const el = document.getElementById('page-' + p);
        if (p === name) { el.classList.add('visible'); el.classList.remove('hidden-back'); }
        else            { el.classList.remove('visible'); el.classList.add('hidden-back'); }
    });
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const map = { landing:'nav-home', monitor:'nav-mon', planner:'nav-plan' };
    document.getElementById(map[name]).classList.add('active');
    currentPage = name;
}

function goHome() {
    resetMonitor();
    resetPlanner();
    showPage('landing');
}

function goMonitor()  { showPage('monitor'); }
function goPlanner()  { showPage('planner'); }

function navMonitor() {
    if (currentPage === 'monitor') resetMonitor();
    else goMonitor();
}
function navPlanner() {
    if (currentPage === 'planner') resetPlanner();
    else goPlanner();
}

// ════════════════════════════════════════════════
//  MONITOR
// ════════════════════════════════════════════════
function buildMonitorPicker() {
    // Only stations that are NOT the last stop on every train serving them
    const monSet = new Set();
    ALL_TRAINS.forEach(t => {
        t.stops.forEach((s, i) => {
            if (i < t.stops.length - 1) monSet.add(norm(s.station));
        });
    });
    const el = document.getElementById('mon-station');
    [...monSet].sort().forEach(s => el.add(new Option(s, s)));
}

function resetMonitor() {
    document.getElementById('mon-station').value = '';
    document.getElementById('pids-board').style.display = 'none';
    document.getElementById('pids-rows').innerHTML = '';
}

function renderPIDS() {
    const station = document.getElementById('mon-station').value;
    if (!station) return;

    const now = nowHHMM();
    // One result per direction: the next upcoming departure
    const byDir = {};

    ALL_TRAINS.forEach(t => {
        const stop = findStop(t, station);
        if (!stop) return;
        if (norm(t.direction) === station) return; // terminal — skip
        if (stop.departure <= now) return;          // already departed

        const dir = norm(t.direction);
        if (!byDir[dir] || stop.departure < byDir[dir].dep) {
            byDir[dir] = { id: t.train_id, dir, dep: stop.departure };
        }
    });

    const rows = Object.values(byDir).sort((a, b) => a.dep.localeCompare(b.dep));
    const board = document.getElementById('pids-board');
    const body  = document.getElementById('pids-rows');

    board.style.display = 'flex';

    if (!rows.length) {
        body.innerHTML = '<div class="pids-empty">Нема планираних полазака.</div>';
        return;
    }

    body.innerHTML = rows.map(r => `
        <div class="pids-row">
            <span class="pids-id">${r.id}</span>
            <span class="pids-dir">${r.dir}</span>
            <span class="pids-time">${r.dep}</span>
        </div>
    `).join('');
}

// ════════════════════════════════════════════════
//  PLANNER
// ════════════════════════════════════════════════
let selectedLine = 0; // 0=none, 1=L1, 2=L2

function selectLine(n) {
    selectedLine = n;
    document.getElementById('btn-l1').className = 'line-btn' + (n===1 ? ' active-l1' : '');
    document.getElementById('btn-l2').className = 'line-btn' + (n===2 ? ' active-l2' : '');

    // Populate pickers with stations on this line only
    const lineKey = n === 1 ? 'BG:voz 1' : 'BG:voz 2';
    const stSet = new Set();
    ALL_TRAINS.filter(t => t.line === lineKey)
              .forEach(t => t.stops.forEach(s => stSet.add(norm(s.station))));
    const sorted = [...stSet].sort();

    ['plan-from','plan-to'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        const placeholder = id === 'plan-from' ? 'Полазиште' : 'Одредиште';
        el.add(new Option(placeholder, '', true, true));
        el.options[0].disabled = true;
        sorted.forEach(s => el.add(new Option(s, s)));
        el.disabled = false;
    });

    document.getElementById('plan-results').innerHTML = '';
    document.getElementById('prev-link').style.display = 'none';
}

function resetPlanner() {
    selectedLine = 0;
    document.getElementById('btn-l1').className = 'line-btn';
    document.getElementById('btn-l2').className = 'line-btn';
    ['plan-from','plan-to'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '';
        const placeholder = id === 'plan-from' ? 'Полазиште' : 'Одредиште';
        el.add(new Option(placeholder, '', true, true));
        el.options[0].disabled = true;
        el.disabled = true;
    });
    document.getElementById('plan-results').innerHTML = '';
    document.getElementById('prev-link').style.display = 'none';
}

function swapStations() {
    const f = document.getElementById('plan-from');
    const t = document.getElementById('plan-to');
    const tmp = f.value; f.value = t.value; t.value = tmp;
    onPickersChange();
}

function onPickersChange() {
    const from = document.getElementById('plan-from').value;
    const to   = document.getElementById('plan-to').value;
    if (!from || !to || from === to) return;
    document.getElementById('prev-link').style.display = 'block';
    renderPlanResults(false);
}

// ── Find direct trains on selected line ──
function findDirect(from, to, lineKey, showPast, now) {
    const results = [];
    ALL_TRAINS.filter(t => t.line === lineKey).forEach(t => {
        const fs = findStop(t, from);
        const ts = findStop(t, to);
        if (!fs || !ts) return;
        if (t.stops.indexOf(fs) >= t.stops.indexOf(ts)) return;
        if (!showPast && fs.departure <= now) return;
        results.push({
            type: 'direct', train: t,
            depTime: fs.departure, arrTime: ts.departure,
            from, to, past: fs.departure <= now
        });
    });
    return results.sort((a, b) => a.depTime.localeCompare(b.depTime));
}

// ── Find transfer connections (only for L2 which has two branches) ──
function findTransfers(from, to, lineKey, showPast, now) {
    if (lineKey === 'BG:voz 1') return []; // L1 is a single line, no transfers needed
    const results = [];
    const lineTr = ALL_TRAINS.filter(t => t.line === lineKey);

    const leg1Pool = lineTr.filter(t => findStop(t, from));
    const leg2Pool = lineTr.filter(t => findStop(t, to));

    leg1Pool.forEach(t1 => {
        const fs = findStop(t1, from);
        if (!showPast && fs.departure <= now) return;
        const fi = t1.stops.indexOf(fs);

        leg2Pool.forEach(t2 => {
            if (t1.train_id === t2.train_id) return;
            const ts = findStop(t2, to);
            const ti = t2.stops.indexOf(ts);

            for (const s1 of t1.stops.slice(fi + 1)) {
                const hubNorm = norm(s1.station);
                const s2 = t2.stops.slice(0, ti).find(s => norm(s.station) === hubNorm);
                if (!s2) continue;
                const wait = diffMin(s1.departure, s2.departure);
                if (wait >= 2 && wait <= 90) {
                    results.push({
                        type: 'transfer', hub: hubNorm,
                        leg1: t1, leg2: t2,
                        arrHub: s1.departure, depHub: s2.departure,
                        depTime: fs.departure, arrTime: ts.departure,
                        from, to, past: fs.departure <= now
                    });
                    break;
                }
            }
        });
    });

    const seen = new Set();
    return results.filter(r => {
        const k = `${r.depTime}|${r.arrTime}|${r.hub}`;
        if (seen.has(k)) return false;
        seen.add(k); return true;
    }).sort((a, b) => a.depTime.localeCompare(b.depTime)).slice(0, 20);
}

// ── Determine dot class for a stop based on current time ──
function dotClass(stopDep, now) {
    if (stopDep < now)  return 'past-dot';
    if (stopDep === now) return 'current-dot';
    // Check if this is the "current" stop (first future stop)
    return 'future-dot';
}

// ── Build itinerary HTML for a leg ──
function buildItin(train, fromNorm, toNorm, now) {
    const si = train.stops.findIndex(s => norm(s.station) === fromNorm);
    const ei = train.stops.findIndex(s => norm(s.station) === toNorm);
    if (si === -1 || ei === -1 || si > ei) return '';

    const stops = train.stops.slice(si, ei + 1);
    // Find current position: last stop whose departure <= now
    let currentIdx = -1;
    stops.forEach((s, i) => { if (s.departure <= now) currentIdx = i; });

    return stops.map((s, i) => {
        let dc;
        if (i < currentIdx)       dc = 'past-dot';
        else if (i === currentIdx) dc = stops[currentIdx].departure < now ? (i === stops.length-1 ? 'past-dot' : 'current-dot') : 'future-dot';
        else                       dc = 'future-dot';
        // If train hasn't started yet, all are future
        if (currentIdx === -1) dc = 'future-dot';
        // If train fully past (last stop passed), last dot is red
        if (currentIdx === stops.length - 1 && i === stops.length - 1) dc = 'past-dot';

        return `<div class="itin-stop">
            <div class="stop-dot ${dc}"></div>
            <span class="stop-name">${norm(s.station)}</span>
            <span class="stop-time">${s.departure}</span>
        </div>`;
    }).join('');
}

function renderPlanResults(showPast) {
    const from = document.getElementById('plan-from').value;
    const to   = document.getElementById('plan-to').value;
    if (!from || !to || !selectedLine) return;

    const lineKey = selectedLine === 1 ? 'BG:voz 1' : 'BG:voz 2';
    const now = nowHHMM();
    const container = document.getElementById('plan-results');
    container.innerHTML = '';

    const direct    = findDirect(from, to, lineKey, showPast, now);
    const transfers = findTransfers(from, to, lineKey, showPast, now);

    const seen = new Set();
    const all  = [...direct, ...transfers].filter(c => {
        const k = `${c.type}|${c.depTime}|${c.arrTime}`;
        if (seen.has(k)) return false;
        seen.add(k); return true;
    }).sort((a, b) => a.depTime.localeCompare(b.depTime));

    if (!all.length) {
        container.innerHTML = `<div class="no-results">Нема пронађених веза.<br><small>Покушај другу станицу или линију.</small></div>`;
        return;
    }

    all.forEach(c => {
        const card = document.createElement('div');
        card.className = 'result-card' + (c.past ? ' past' : '');

        if (c.type === 'direct') {
            const dur = diffMin(c.depTime, c.arrTime);
            const itin = buildItin(c.train, from, to, now);
            card.innerHTML = `
                <div class="card-top">
                    <div class="card-left">
                        <div class="card-dep">${c.depTime}</div>
                        <div class="card-arr">→ ${c.arrTime}</div>
                        <div class="card-id">${c.train.train_id}</div>
                    </div>
                    <div class="card-right">
                        <div class="card-dest">${norm(c.train.direction)}</div>
                        <div class="card-info">${from} → ${to} · ${dur} мин</div>
                    </div>
                </div>
                <div class="itinerary"><div class="itin-inner">${itin}</div></div>`;
        } else {
            const wait = diffMin(c.arrHub, c.depHub);
            const dur  = diffMin(c.depTime, c.arrTime);
            const itin1 = buildItin(c.leg1, from, c.hub, now);
            const itin2 = buildItin(c.leg2, c.hub, to, now);
            card.innerHTML = `
                <div class="card-top">
                    <div class="card-left">
                        <div class="card-dep">${c.depTime}</div>
                        <div class="card-arr">→ ${c.arrTime}</div>
                        <div class="card-id">${c.leg1.train_id}</div>
                    </div>
                    <div class="card-right">
                        <div class="card-dest">${to}</div>
                        <div class="card-info">${from} → ${to} · ${dur} мин</div>
                        <div class="card-transfer">⇄ Преседање: ${c.hub} (${wait} мин)</div>
                    </div>
                </div>
                <div class="itinerary"><div class="itin-inner">
                    ${itin1}
                    <div class="itin-transfer-badge">⇄ Преседање на ${c.hub} · чекање ${wait} мин</div>
                    ${itin2}
                </div></div>`;
        }

        card.querySelector('.card-top').addEventListener('click', () => {
            const wasOpen = card.classList.contains('expanded');
            document.querySelectorAll('.result-card').forEach(x => x.classList.remove('expanded'));
            if (!wasOpen) card.classList.add('expanded');
        });

        container.appendChild(card);
    });
}
