<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BG:VOZ Live</title>
<style>
:root {
  --glass-bg: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.18);
  --glass-blur: blur(25px);
  --accent-yellow: #FFD700;
  --text-main: #FFFFFF;
  --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-ios);
  color: var(--text-main);
  height: 100vh; width: 100vw; overflow: hidden;
  background: #050a14;
}

.page {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  transition: all 0.4s ease-out;
  padding-top: 60px; padding-bottom: 100px;
  opacity: 0; pointer-events: none;
  overflow-y: auto;
}
.page.active { opacity: 1; pointer-events: auto; }

/* LAYOUT FIXES */
.plan-controls { width: 100%; padding: 0 20px; position: relative; margin-bottom: 15px; }
.input-group { 
    background: var(--glass-bg); 
    border-radius: 20px; 
    border: 1px solid var(--glass-border); 
    display: flex; 
    flex-direction: column; 
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
}
.plan-select { 
    width: 100%; 
    padding: 22px; 
    background: transparent; 
    border: none; 
    color: white !important; 
    font-size: 1rem; 
    outline: none; 
    appearance: none;
}
.plan-select option { background: #0a1428; color: white; }

/* SWAP BUTTON */
.swap-btn { 
    position: absolute; 
    right: 35px; 
    top: 50%; 
    transform: translateY(-50%); 
    width: 44px; 
    height: 44px; 
    background: #1a1a1a; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border: 1px solid var(--glass-border); 
    z-index: 10; 
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* RESULTS LIST */
.pids-board { width: 100%; background: #000; border-radius: 15px; border: 1px solid #222; margin-top: 10px; overflow: hidden; }
.pids-row { display: grid; grid-template-columns: 70px 1fr 80px; padding: 18px; border-bottom: 1px solid #111; align-items: center; }
.col-vnum { color: #666; font-size: 0.8rem; font-family: monospace; }
.col-dir { color: var(--accent-yellow); font-weight: 700; text-transform: uppercase; }
.col-time { text-align: right; color: var(--accent-yellow); font-weight: bold; font-family: monospace; font-size: 1.1rem; }

/* NAVIGATION */
.nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 260px; height: 65px; background: rgba(20,20,20,0.85); backdrop-filter: var(--glass-blur); border-radius: 35px; border: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
.nav-item { opacity: 0.3; transition: 0.3s; padding: 10px; }
.nav-item.active { opacity: 1; transform: scale(1.1); }
.nav-item svg { width: 26px; height: 26px; fill: white; }
</style>
</head>
<body>

<div id="home-page" class="page active">
  <div style="margin-top: 50px; text-align:center;">
    <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; letter-spacing: 2px;">BG:VOZ</h1>
    <div style="display:flex; flex-direction:column; gap:15px; width:280px;">
        <div style="background:var(--glass-bg); padding:20px; border-radius:20px; border:1px solid var(--glass-border); cursor:pointer; font-weight: bold;" onclick="goTo('monitor')">STANIČNI MONITOR</div>
        <div style="background:var(--glass-bg); padding:20px; border-radius:20px; border:1px solid var(--glass-border); cursor:pointer; font-weight: bold;" onclick="goTo('plan')">PLANER PUTA</div>
    </div>
  </div>
</div>

<div id="monitor-page" class="page">
  <div class="plan-controls">
    <div class="input-group">
      <select id="stationPicker" class="plan-select" onchange="updatePIDS(this.value)">
        <option value="" disabled selected>Izaberi stanicu...</option>
      </select>
    </div>
  </div>
  <div id="pidsDisplay" style="width: 100%; padding: 0 20px;">
    <div id="pidsBody"></div>
  </div>
</div>

<div id="plan-page" class="page">
  <div class="plan-controls">
    <div class="input-group">
      <select id="fromPicker" class="plan-select" onchange="runPlanner()"><option value="" disabled selected>Polazak</option></select>
      <div style="height:1px; background:rgba(255,255,255,0.1); margin:0 20px;"></div>
      <select id="toPicker" class="plan-select" onchange="runPlanner()"><option value="" disabled selected>Dolazak</option></select>
    </div>
    <button class="swap-btn" onclick="swapStations()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M7 16V4M7 4L3 8M7 4L11 8M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
    </button>
  </div>
  <div id="plannerResults" style="width: 100%; margin-top: 10px;"></div>
</div>

<nav class="nav-bar">
  <div class="nav-item active" id="nav-home" onclick="goTo('home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
  <div class="nav-item" id="nav-monitor" onclick="goTo('monitor')"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg></div>
  <div class="nav-item" id="nav-plan" onclick="goTo('plan')"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
</nav>

<script>
const stations = ["Batajnica", "Kamendin", "Zemun polje", "Altina", "Zemun", "Tošin bunar", "Novi Beograd", "Beograd centar (Prokop)", "Karađorđev park", "Vukov spomenik", "Pančevački most", "Krnjača most", "Krnjača", "Sebeš", "Ovča", "Rakovica", "Kneževac", "Kijevo", "Resnik"];

let trainData = [];

// Helper to normalize strings (trim and lower)
const normalize = (s) => s ? s.trim().toLowerCase() : "";

async function loadData() {
  try {
    // Relative path for GitHub Pages
    const response = await fetch('./trains.json');
    if (!response.ok) throw new Error("File not found");
    trainData = await response.json();
    populatePickers();
  } catch (e) {
    document.getElementById('pidsBody').innerHTML = "<p style='text-align:center; padding-top:20px;'>Greska: Ne mogu da ucitam podatke.</p>";
    console.error(e);
  }
}

function populatePickers() {
  const sorted = [...stations].sort((a,b) => a.localeCompare(b));
  let h = `<option value="" disabled selected>Izaberi stanicu...</option>`;
  sorted.forEach(s => h += `<option value="${s}">${s}</option>`);
  document.getElementById('stationPicker').innerHTML = h;
  document.getElementById('fromPicker').innerHTML = h;
  document.getElementById('toPicker').innerHTML = h;
}

const timeToMin = (t) => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };

function updatePIDS(val) {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  let html = '';
  
  trainData.forEach(tr => {
    // Robust station matching
    const stop = tr.stops.find(s => normalize(s.station) === normalize(val));
    if(stop) {
      const depMin = timeToMin(stop.departure);
      if(depMin >= nowMin) {
        html += `<div class="pids-row">
          <div class="col-vnum">${tr.train_id}</div>
          <div class="col-dir">${tr.direction}</div>
          <div class="col-time">${stop.departure}</div>
        </div>`;
      }
    }
  });
  
  const container = document.getElementById('pidsBody');
  container.innerHTML = html ? `<div class="pids-board">${html}</div>` : `<p style='text-align:center; padding:40px; opacity:0.5;'>Nema preostalih polazaka.</p>`;
}

function runPlanner() {
  const f = document.getElementById('fromPicker').value;
  const t = document.getElementById('toPicker').value;
  if(!f || !t || f === t) return;
  
  let routes = [];
  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

  trainData.forEach(tr => {
    const sIdx = tr.stops.findIndex(s => normalize(s.station) === normalize(f));
    const eIdx = tr.stops.findIndex(s => normalize(s.station) === normalize(t));
    if(sIdx !== -1 && eIdx !== -1 && sIdx < eIdx) {
      if(timeToMin(tr.stops[sIdx].departure) >= nowMin) {
        routes.push({ tr, dep: tr.stops[sIdx].departure, arr: tr.stops[eIdx].departure, dMin: timeToMin(tr.stops[sIdx].departure) });
      }
    }
  });

  const resDiv = document.getElementById('plannerResults');
  resDiv.innerHTML = routes.length > 0 ? routes.sort((a,b) => a.dMin - b.dMin).map(r => `
    <div style="background:var(--glass-bg); margin:10px 20px; border-radius:18px; border:1px solid var(--glass-border); padding:15px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="font-size:1.3rem; font-weight:800; color:var(--accent-yellow);">${r.dep} → ${r.arr}</div>
        <div style="font-size:0.75rem; opacity:0.6;">Voz ${r.tr.train_id}</div>
      </div>
    </div>`).join('') : `<p style='text-align:center; padding:40px; opacity:0.5;'>Nema direktnih rezultata.</p>`;
}

function swapStations() {
  const f = document.getElementById('fromPicker'), t = document.getElementById('toPicker');
  const tmp = f.value; f.value = t.value; t.value = tmp;
  runPlanner();
}

function goTo(s) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(s + '-page').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + s).classList.add('active');
}

window.onload = loadData;
</script>
</body>
</html>
