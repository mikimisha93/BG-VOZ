<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БГ:воз</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR STYLES (unchanged) */
body { font-family: 'DM Sans', sans-serif; background: linear-gradient(160deg,#E30613,#1A3A6B); color:white; margin:0; }
.screen { display:none; padding:20px; }
.screen.active { display:block; }
.glass-panel { background: rgba(255,255,255,0.1); padding:15px; border-radius:16px; margin-bottom:10px; }
select { width:100%; padding:10px; margin-bottom:10px; }
.stop-dot { width:10px; height:10px; border-radius:50%; background:#aaa; display:inline-block; margin-right:8px; }
.reached { background:white; }
.current { background:#4ADE80; }
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="screen active">
<h1>БГ:ВОЗ</h1>
<button onclick="openMonitor()">СТАНИЧНИ МОНИТОР</button>
<button onclick="openPlanner()">ПЛАНИРАЈ ПУТОВАЊЕ</button>
</div>

<!-- MONITOR -->
<div id="monitor" class="screen">
<h2>СТАНИЧНИ МОНИТОР</h2>
<select id="monStation" onchange="loadPIDS()"></select>
<div id="pidsOutput"></div>
<button onclick="goHome()">Назад</button>
</div>

<!-- PLANNER -->
<div id="planner" class="screen">
<h2>ПЛАНИРАЈ ПУТОВАЊЕ</h2>
<select id="planFrom" onchange="runPlanner()"></select>
<select id="planTo" onchange="runPlanner()"></select>
<div id="planResults"></div>
<button onclick="goHome()">Назад</button>
</div>

<script>
const STATIONS = [];
let allTrains = [];

async function init() {
    const res = await fetch('trains.json');
    allTrains = await res.json();

    // collect stations dynamically
    allTrains.forEach(t => {
        t.stops.forEach(s => {
            if (!STATIONS.includes(s.station)) STATIONS.push(s.station);
        });
    });

    STATIONS.sort();
    populatePickers();
}

function populatePickers() {
    ['monStation','planFrom','planTo'].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '<option value="">Изабери</option>';
        STATIONS.forEach(s => el.add(new Option(s,s)));
    });
}

function switchScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function goHome(){ switchScreen('landing'); }
function openMonitor(){ switchScreen('monitor'); }
function openPlanner(){ switchScreen('planner'); }

/* ---------------- PIDS ---------------- */
function loadPIDS(){
    const station = document.getElementById('monStation').value;
    if(!station) return;

    const now = new Date().toTimeString().slice(0,5);
    let departures = [];

    allTrains.forEach(train=>{
        const idx = train.stops.findIndex(s=>s.station===station);
        if(idx===-1 || idx===train.stops.length-1) return;

        const stop = train.stops[idx];

        if(stop.departure>=now){
            departures.push({
                train,
                time: stop.departure,
                direction: train.stops.at(-1).station
            });
        }
    });

    const grouped = {};
    departures.forEach(d=>{
        if(!grouped[d.direction] || d.time < grouped[d.direction].time){
            grouped[d.direction] = d;
        }
    });

    const results = Object.values(grouped).sort((a,b)=>a.time.localeCompare(b.time));

    if(results.length===0){
        document.getElementById('pidsOutput').innerHTML="Нема полазака";
        return;
    }

    document.getElementById('pidsOutput').innerHTML =
        results.map(r=>`
        <div class="glass-panel">
            ${r.train.train_id} → ${r.direction} (${r.time})
        </div>`).join('');
}

/* ---------------- PLANNER ---------------- */
function runPlanner(){
    const from = planFrom.value;
    const to = planTo.value;
    if(!from||!to||from===to) return;

    const now = new Date().toTimeString().slice(0,5);

    let results = [];

    // direct
    allTrains.forEach(t=>{
        const fi = t.stops.findIndex(s=>s.station===from);
        const ti = t.stops.findIndex(s=>s.station===to);
        if(fi!==-1 && ti!==-1 && fi<ti){
            results.push({type:'direct',trains:[t]});
        }
    });

    // transfers
    allTrains.forEach(t1=>{
        const fi = t1.stops.findIndex(s=>s.station===from);
        if(fi===-1) return;

        t1.stops.slice(fi+1).forEach(mid=>{
            allTrains.forEach(t2=>{
                const s2 = t2.stops.findIndex(s=>s.station===mid.station);
                const e2 = t2.stops.findIndex(s=>s.station===to);
                if(s2===-1||e2===-1||s2>=e2) return;

                const wait = timeDiff(mid.departure, t2.stops[s2].departure);
                if(wait>=3 && wait<=30){
                    results.push({type:'transfer',trains:[t1,t2]});
                }
            });
        });
    });

    renderResults(results, now, from, to);
}

function timeDiff(a,b){
    const [h1,m1]=a.split(':').map(Number);
    const [h2,m2]=b.split(':').map(Number);
    return (h2*60+m2)-(h1*60+m1);
}

function renderResults(results, now, from, to){
    const el = document.getElementById('planResults');

    if(results.length===0){
        el.innerHTML="Нема рута";
        return;
    }

    el.innerHTML = results.map(r=>{
        const t1 = r.trains[0];
        const dep = t1.stops.find(s=>s.station===from).departure;
        const last = r.trains.at(-1);
        const arr = last.stops.find(s=>s.station===to).departure;

        return `
        <div class="glass-panel">
            <b>${dep} → ${arr}</b> (${r.type})
            ${r.trains.map(t=>renderStops(t,now)).join('<hr>')}
        </div>`;
    }).join('');
}

/* ---------------- TRAIN POSITION ---------------- */
function renderStops(train, now){
    return train.stops.map((s,i)=>{
        let cls='';
        if(s.departure<now) cls='reached';

        if(i>0 && train.stops[i-1].departure<=now && s.departure>now){
            cls='current';
        }

        return `
        <div>
            <span class="stop-dot ${cls}"></span>
            ${s.station} (${s.departure})
        </div>`;
    }).join('');
}

init();
</script>

</body>
</html>
