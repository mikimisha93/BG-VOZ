<!DOCTYPE html>

<html lang="sr">

<head>

    <meta charset="UTF-8">

    <meta name="theme-color" content="#1a1f2c">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>БГ:воз</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root {

    --bg: #1a1f2c; 

    --l1: #c0392b;

    --l2: #1a6fc4;

    --glass: rgba(255,255,255,0.12);

    --glass-border: rgba(255,255,255,0.2); 

    --text: #f0f0f0;

    --dim: rgba(255,255,255,0.4);

    --yellow: #f0c040;

    --green: #3ddc84;

    --mono: 'JetBrains Mono', monospace;

    --sans: 'Space Grotesk', sans-serif;

    --text: #f0f0f0; 

}



* { 

    margin: 0; 

    padding: 0; 

    box-sizing: border-box; 

    -webkit-tap-highlight-color: transparent; 

}



body {

    margin: 0;

    padding: 0;

    font-family: var(--sans);

    /* Change this to match your theme-color meta tag */

    background-color: var(--bg); 

    color: var(--text) !important;

    height: 100dvh; 

    width: 100vw;

    overflow: hidden;

    position: relative;

    /* This handles the notch area */

    padding-top: env(safe-area-inset-top, 0px);

}



body::before, body::after {

    content: '';

    position: fixed; 

    top: -50%; 

    left: -50%; 

    width: 200%; 

    height: 200%; 

    z-index: -1; /* Move it BEHIND everything including the status bar area */

    filter: blur(80px);

    pointer-events: none;

}



/* THE RED LAVA */

body::before {

    background: radial-gradient(circle at center, rgba(192, 57, 43, 0.6) 0%, transparent 50%);

    animation: lavaRed 25s ease-in-out infinite alternate;

}



/* THE BLUE LAVA */

body::after {

    background: radial-gradient(circle at center, rgba(26, 111, 196, 0.6) 0%, transparent 50%);

    animation: lavaBlue 30s ease-in-out infinite alternate-reverse;

}



/* ── PAGES ── */

.page {

    position: absolute; inset: 0;

    display: flex; flex-direction: column; align-items: center;

    z-index: 1;

    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s;

    padding-bottom: 110px;

    overflow: hidden;

    pointer-events: none; 

    opacity: 0;

}



.page.visible { 

    opacity: 1 !important; 

    transform: translateY(0) !important; 

    pointer-events: all !important; 

    z-index: 10; 

}



/* ── LANDING ── */

.landing-inner {

    display: flex; 

    flex-direction: column; 

    align-items: center; 

    justify-content: flex-start; 

    height: 100%; 

    width: 100%; 

    padding: 8vh 28px 20px; /* Moves the logo slightly down from the very top */

}



.brand { 

    text-align: center; 

    margin-bottom: 2vh; 

}



.brand-icon svg { width: 52px; height: 52px; }



.brand-name {

    font-family: var(--mono); font-size: 2.4rem; font-weight: 700; letter-spacing: 0.12em;

    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));

    -webkit-background-clip: text; -webkit-text-fill-color: transparent;

}



.brand-sub { font-size: 0.7rem; opacity: 0.4; letter-spacing: 0.2em; text-transform: uppercase; }



.landing-actions { 

    width: 100%; 

    display: flex; 

    flex-direction: column; 

    gap: 12px; 

    margin-top: auto;    /* Pushes actions to the middle */

    margin-bottom: auto; /* Pushes actions away from the QR code */

}



.action-btn {

    width: 100%; padding: 18px 24px; border-radius: 18px;

    background: var(--glass); border: 1px solid var(--glass-border);

    backdrop-filter: blur(20px); color: var(--text); font-family: var(--sans); 

    font-size: 0.9rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;

    cursor: pointer; display: flex; align-items: center; gap: 16px; transition: 0.2s;

}



.action-icon { width: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.action-icon svg { width: 24px; height: 24px; fill: white; opacity: 0.9; }



.landing-qr { 

    margin-bottom: 20px; /* Keeps it just above the navigation bar */

    display: flex; 

    flex-direction: column; 

    align-items: center; 

    animation: fadeIn 1.2s ease-out forwards; 

}

.qr-wrap { background: white; padding: 6px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

.qr-wrap img { width: 90px; height: 90px; display: block; border-radius: 4px; }



/* ── SHARED PAGE CHROME ── */

.page-header { width:100%; padding: 6vh 24px 0; flex-shrink:0; }

.page-title { font-size:1.1rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; opacity:0.9; margin-bottom:20px; text-align:center; }



/* ── GLASS SELECT ── */

.g-select { width:100%; padding: 12px 16px; border-radius:14px; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); color: white; font-family:var(--sans); font-size: 0.9rem; outline:none; appearance:none; cursor:pointer; }

option { background:#111827; color:white; }



/* ── MONITOR ── */

.monitor-body { 

    width:100%; 

    padding:0 20px; 

    display:flex; 

    flex-direction:column; 

    gap:16px; 

    /* Remove flex:1 so it doesn't force children to stretch */

    height: auto;

    overflow-y: auto;

}

.pids-board { 

    background:#000; 

    border:2px solid #222; 

    border-radius:12px; 

    overflow:hidden; 

    /* Remove flex:1 and min-height */

    display:flex; 

    flex-direction:column; 

    width: 100%;

    margin-bottom: 100px; /* Space for the nav bar */

}

.pids-head { display:grid; grid-template-columns:80px 1fr 72px; padding:10px 16px; background:#111; border-bottom:1px solid #222; font-family:var(--mono); font-size:0.65rem; color:rgba(255,255,255,0.35); }

.pids-rows { 

    /* Remove flex:1 so it shrinks to content size */

    overflow-y: visible; 

}

.pids-row { display:grid; grid-template-columns:80px 1fr 72px; padding:14px 16px; border-bottom:1px solid #111; font-family:var(--mono); align-items:center; }

.pids-id { font-size: 0.7rem; color: var(--dim); }

.pids-dir { font-weight: 700; color: white; text-align: center; }

.pids-time { font-weight: 700; color: var(--yellow); text-align: right; }



/* ── PLANNER ── */

/* ── COMPACT PLANNER ── */

.planner-body { 

    width:100%; 

    padding: 12px 16px;

    display:flex; 

    flex-direction:column; 

    gap:8px; /* Reduced gap */

    flex:1; 

    min-height:0;

    overflow:hidden; 

}

.line-selector { 

    display:flex; 

    gap:8px; 

    margin-bottom: 2px; 

}

.line-btn { 

    flex:1; 

    padding:10px; /* Reduced from 14px */

    border-radius:12px; 

    border:1px solid var(--glass-border); 

    background: var(--glass); 

    color:white; 

    font-family:var(--sans); 

    font-size:0.8rem; /* Slightly smaller text */

    font-weight:700; 

    cursor:pointer; 

    display:flex; 

    align-items:center; 

    justify-content:center; 

    gap:6px; 

    transition:0.2s; 

}

.line-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

.line-btn.active-l1 { border-color:var(--l1); background:rgba(192,57,43,0.2); }

.line-btn.active-l2 { border-color:var(--l2); background:rgba(26,111,196,0.2); }



.planner-selection-group { 

    display: flex; 

    align-items: center; 

    gap: 8px; 

    width: 100%; 

    margin-bottom: 4px; 

}

.inputs-stack { 

    display: flex; 

    flex-direction: column; 

    gap: 6px; 

    flex: 1; 

}

.swap-btn { 

    width: 40px; 

    height: 80px; /* Tall button to match the height of two stacked selects */

    border-radius: 12px; 

    background: var(--glass); 

    border: 1px solid var(--glass-border); 

    display: flex; 

    align-items: center; 

    justify-content: center; 

    cursor: pointer; 

}



.results-scroll { 

    flex:1; 

    overflow-y:auto; 

    padding:10px 0 100px; /* Extra bottom padding so nav doesn't cover last result */

    display:flex; 

    flex-direction:column; 

    gap:10px; 

}

.result-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; transition: 0.3s; cursor: pointer; flex-shrink: 0; }

.result-card.past { opacity: 0.5; }

.card-top { display: grid; grid-template-columns: 70px 1fr 70px; align-items: center; padding: 18px 16px; }

.card-id { font-family: var(--mono); font-size: 0.7rem; color: var(--dim); }

.card-dest { font-weight: 700; font-size: 1.1rem; text-align: center; color: white; }

.card-dep { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--yellow); text-align: right; }



.itinerary { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(0,0,0,0.2); }

.result-card.expanded .itinerary { max-height: 1500px; border-top: 1px solid var(--glass-border); }

.itin-inner { padding: 20px; position: relative; margin-left: 10px; }

.itin-inner::before { content: ''; position: absolute; left: 25px; top: 25px; bottom: 25px; width: 2px; background: rgba(255,255,255,0.1); }

.itin-stop { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; position: relative; }

.stop-name { margin-left: 40px; font-size: 0.9rem; flex: 1; }

.stop-time { font-family: var(--mono); font-size: 0.85rem; color: var(--dim); }

.stop-dot { position: absolute; left: 2px; width: 10px; height: 10px; border-radius: 50%; background: #444; z-index: 2; }

.dot-past { background: var(--l1); }

.dot-current { background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 1.5s infinite; }



/* ── NAV BAR ── */

.nav-bar { 

    position: fixed; 

    bottom: 28px; 

    left: 50%; 

    transform: translateX(-50%); 

    width: calc(100% - 48px); 

    max-width: 320px; 

    height: 66px; 

    /* CHANGED: Used your glass variable and slightly more blur */

    background: var(--glass); 

    backdrop-filter: blur(40px); 

    -webkit-backdrop-filter: blur(40px); /* For iOS support */

    border: 1px solid var(--glass-border); 

    border-radius: 33px; 

    display: flex; 

    justify-content: space-around; 

    align-items: center; 

    z-index: 9999; 

}

.nav-btn { width:54px; height:54px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:50%; }

.nav-btn svg { width:24px; height:24px; fill:rgba(255,255,255,0.5); }

.nav-btn.active svg { fill:white; filter:drop-shadow(0 0 6px rgba(255,255,255,0.5)); }



@keyframes lavaRed { 

    0% { transform: translate(-10%, -10%) scale(1); } 

    50% { transform: translate(15%, 10%) scale(1.2); }

    100% { transform: translate(-5%, 20%) scale(1); } 

}



@keyframes lavaBlue { 

    0% { transform: translate(10%, 10%) scale(1.2); } 

    50% { transform: translate(-15%, -10%) scale(1); }

    100% { transform: translate(5%, -20%) scale(1.1); } 

}

@keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 70% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── PIDS TICKER ── */

.pids-ticker {

    background: #111;

    border-top: 1px solid #222;

    padding: 10px 0;

    overflow: hidden;

    white-space: nowrap;

}



.ticker-text {

    display: inline-block;

    font-family: var(--mono);

    font-size: 0.75rem;

    color: #ff3333; /* Station Red */

    font-weight: 700;

    padding-left: 100%;

    animation: marquee 35s linear infinite;

}



@keyframes marquee {

    0% { transform: translateX(0); }

    100% { transform: translateX(-100%); }

}

</style>

</head>

<body>



<div id="page-landing" class="page visible">

    <div class="landing-inner">

        <div class="brand">

            <div class="brand-icon">

                <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">

                    <rect x="8" y="6" width="36" height="30" rx="6" fill="none" stroke="white" stroke-width="2"/>

                    <line x1="8" y1="22" x2="44" y2="22" stroke="white" stroke-width="2" opacity="0.5"/>

                <div class="action-icon"><svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg></div>

        <select id="mon-station" class="g-select" onchange="renderPIDS()">

            <div class="line-btn" id="btn-l1" onclick="selectLine(1)"><div class="line-dot" style="background:var(--l1)"></div>БГ:1</div>

                <select id="plan-from" class="g-select" onchange="onPickersChange()" disabled><option value="" disabled selected>полазак</option></select>

<nav class="nav-bar">

    <div class="nav-btn active" id="nav-home" onclick="goHome()"><svg viewBox="0 0 24 24"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg></div>

    <div class="nav-btn" id="nav-mon" onclick="goMonitor()"><svg viewBox="0 0 24 24"><path d="M12,20A8,8 0 0,0 20,12A8,8 0 0,0 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22C6.47,22 2,17.5 2,12A10,10 0 0,1 12,2M12.5,7V12.25L17,14.92L16.25,16.15L11,13V7H12.5Z"/></svg></div>

    <div class="nav-btn" id="nav-plan" onclick="goPlanner()"><svg viewBox="0 0 24 24"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg></div>

</nav>



<script>

let ALL_TRAINS = [];

let selectedLine = 0;



async function loadData() {

    try {

        const res = await fetch('trains.json');

        ALL_TRAINS = await res.json();

        buildMonitorPicker();

    } catch(e) { console.error("Error loading trains.json", e); }

}



function norm(s) { return s.replace(/\s*\((Arr|Dep)\)\s*$/i, '').trim(); }

function nowHHMM() { return new Date().toTimeString().slice(0, 5); }



function showPage(name) {

    const pages = ['landing', 'monitor', 'planner'];

    pages.forEach(p => {

        const el = document.getElementById('page-' + p);

        if (p === name) el.classList.add('visible');

        else el.classList.remove('visible');

    });

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    const map = { landing:'nav-home', monitor:'nav-mon', planner:'nav-plan' };

    document.getElementById(map[name]).classList.add('active');

}



function goHome() {

    // 1. Reset Monitor Page

    const monSelect = document.getElementById('mon-station');

    if (monSelect) monSelect.selectedIndex = 0; // Back to placeholder

    

    const pidsBoard = document.getElementById('pids-board');

    if (pidsBoard) pidsBoard.style.display = 'none'; // Hide the board

    

    const pidsRows = document.getElementById('pids-rows');

    if (pidsRows) pidsRows.innerHTML = ''; // Clear train rows



    // 2. Reset Planner Page

    selectedLine = 0;

    

    // Reset BG:1 and BG:2 buttons to default look

    const btnL1 = document.getElementById('btn-l1');

    const btnL2 = document.getElementById('btn-l2');

    if (btnL1) btnL1.className = 'line-btn';

    if (btnL2) btnL2.className = 'line-btn';



    // Clear and disable the station pickers

    const planFrom = document.getElementById('plan-from');

    const planTo = document.getElementById('plan-to');

    if (planFrom) {

        planFrom.innerHTML = '<option value="" disabled selected>полазак</option>';

        planFrom.disabled = true;

    }

    if (planTo) {

        planTo.innerHTML = '<option value="" disabled selected>долазак</option>';

        planTo.disabled = true;

    }



    // Clear search result cards

    const planResults = document.getElementById('plan-results');

    if (planResults) planResults.innerHTML = '';



    // 3. Navigate to Landing

    showPage('landing');

}

function goMonitor() { showPage('monitor'); }

function goPlanner() { showPage('planner'); }



function buildMonitorPicker() {

    const monSet = new Set();

    ALL_TRAINS.forEach(t => t.stops.forEach((s, i) => { if(i < t.stops.length-1) monSet.add(norm(s.station)); }));

    const el = document.getElementById('mon-station');

    [...monSet].sort().forEach(s => el.add(new Option(s, s)));

}



function renderPIDS() {

    const station = document.getElementById('mon-station').value;

    const now = nowHHMM();

    const byDir = {};

    ALL_TRAINS.forEach(t => {

        const stop = t.stops.find(s => norm(s.station) === station);

        if (stop && stop.departure > now && norm(t.direction) !== station) {

            const dir = norm(t.direction);

            if (!byDir[dir] || stop.departure < byDir[dir].dep) {

                byDir[dir] = { id: t.train_id, dir, dep: stop.departure };

            }

        }

    });

    const rows = Object.values(byDir).sort((a,b) => a.dep.localeCompare(b.dep));

    document.getElementById('pids-board').style.display = 'flex';

    document.getElementById('pids-rows').innerHTML = rows.map(r => `

        <div class="pids-row">

            <span class="pids-id">${r.id}</span>

            <span class="pids-dir">${r.dir}</span>

            <span class="pids-time">${r.dep}</span>

        </div>`).join('');

}



function selectLine(n) {

    selectedLine = n;

    document.getElementById('btn-l1').className = 'line-btn' + (n===1 ? ' active-l1' : '');

    document.getElementById('btn-l2').className = 'line-btn' + (n===2 ? ' active-l2' : '');



    const lineKey = n === 1 ? 'BG:voz 1' : 'BG:voz 2';

    

    // FIND RELEVANT STATIONS IN GEOGRAPHICAL ORDER

    // We look at the longest route for this line to get the correct station sequence

    let longestRoute = [];

    ALL_TRAINS.filter(t => t.line === lineKey).forEach(t => {

        if (t.stops.length > longestRoute.length) longestRoute = t.stops.map(s => norm(s.station));

    });



    ['plan-from','plan-to'].forEach(id => {

        const el = document.getElementById(id);

        el.innerHTML = '<option value="" disabled selected>' + (id==='plan-from'?'полазак':'долазак') + '</option>';

        longestRoute.forEach(s => el.add(new Option(s, s)));

        el.disabled = false;

    });

}



function swapStations() {

    const f = document.getElementById('plan-from');

    const t = document.getElementById('plan-to');

    const tmp = f.value; f.value = t.value; t.value = tmp;

    onPickersChange();

}



function onPickersChange() {

    const f = document.getElementById('plan-from').value;

    const t = document.getElementById('plan-to').value;

    if (f && t) renderPlanResults();

}



function renderPlanResults() {

    const from = document.getElementById('plan-from').value;

    const to = document.getElementById('plan-to').value;

    const lineKey = selectedLine === 1 ? 'BG:voz 1' : 'BG:voz 2';

    const now = nowHHMM();

    const container = document.getElementById('plan-results');

    container.innerHTML = '';



    const results = ALL_TRAINS.filter(t => {

        if (t.line !== lineKey) return false;

        const s1 = t.stops.findIndex(s => norm(s.station) === from);

        const s2 = t.stops.findIndex(s => norm(s.station) === to);

        return s1 !== -1 && s2 !== -1 && s1 < s2;

    }).sort((a,b) => {

        const t1 = a.stops.find(s => norm(s.station) === from).departure;

        const t2 = b.stops.find(s => norm(s.station) === from).departure;

        return t1.localeCompare(t2);

    });



    if (results.length === 0) {

        container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5">Нема возова на овој релацији.</div>';

        return;

    }



    results.forEach(t => {

        const depTime = t.stops.find(s => norm(s.station) === from).departure;

        const isPast = depTime < now;

        const sIdx = t.stops.findIndex(s => norm(s.station) === from);

        const eIdx = t.stops.findIndex(s => norm(s.station) === to);

        const tripStops = t.stops.slice(sIdx, eIdx + 1);



        const card = document.createElement('div');

        card.className = `result-card ${isPast ? 'past' : ''}`;

        card.innerHTML = `

            <div class="card-top">

                <div class="card-id">${t.train_id}</div>

                <div class="card-dest">${norm(t.direction)}</div>

                <div class="card-dep">${depTime}</div>

            </div>

            <div class="itinerary">

                <div class="itin-inner">

                    ${tripStops.map((s, i) => {

                        let dot = 'dot-future';

                        if (s.departure < now) dot = 'dot-past';

                        else if (i === 0 || (tripStops[i-1] && tripStops[i-1].departure < now)) dot = 'dot-current';

                        return `<div class="itin-stop">

                            <div class="stop-dot ${dot}"></div>

                            <span class="stop-name">${norm(s.station)}</span>

                            <span class="stop-time">${s.departure}</span>

                        </div>`;

                    }).join('')}

                </div>

            </div>`;



        card.onclick = () => {

            const alreadyExpanded = card.classList.contains('expanded');

            

            // Close all other cards

            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('expanded'));

            

            if(!alreadyExpanded) {

                card.classList.add('expanded');

                // Auto-scroll to show the expanded content after animation starts

                setTimeout(() => {

                    card.scrollIntoView({ behavior: 'smooth', block: 'start' });

                }, 100);

            }

        };

        container.appendChild(card);

    });

}

loadData();

</script>
