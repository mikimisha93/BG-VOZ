<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BG:VOZ Live</title>
<style>
:root {
  --glass-bg: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.18);
  --glass-blur: blur(25px);
  --accent-yellow: #FFD700;
  --accent-orange: #FF9500;
  --accent-blue: #007AFF;
  --accent-red: #FF3B30;
  --text-main: #FFFFFF;
  --font-ios: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-ios);
  color: var(--text-main);
  height: 100vh; width: 100vw; overflow: hidden;
  background: linear-gradient(-45deg, #050a14, #1a0505, #0a1428, #140514);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}
@keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

.page {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  padding-top: 80px;
  padding-bottom: 120px;
  opacity: 0;
  pointer-events: none;
  transform: scale(1.1);
  overflow-y: auto;
}
.page.active { opacity: 1; pointer-events: auto; transform: scale(1); }

/* PIDS BOARD */
.pids-board { width: 100%; background: #000; border: 1px solid #222; border-radius: 15px; overflow: hidden; margin-top: 10px; }
.pids-header, .pids-row { display: grid; grid-template-columns: 70px 1fr 100px; padding: 12px 15px; align-items: center; }
.pids-header { background: #111; border-bottom: 1px solid #222; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; color: #FFFFFF; letter-spacing: 0.05em; }
.pids-row { padding: 18px 15px; border-bottom: 1px solid #111; }
.col-vnum { text-align: left; color: #666; font-family: monospace; font-size: 0.85rem; }
.col-dir { text-align: left; padding-left: 5px; color: var(--accent-yellow); font-weight: 700; font-size: 0.95rem; text-transform: uppercase; }
.col-time { text-align: right; color: var(--accent-yellow); font-family: monospace; font-size: 1.2rem; font-weight: bold; }
.blink { animation: blinker 1s linear infinite; }
@keyframes blinker { 50% { opacity: 0; } }

/* Navigation */
.nav-bar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 9999; }
.nav-item { height: 100%; display: flex; align-items: center; justify-content: center; color: white; opacity: 0.4; transition: all 0.3s; cursor: pointer; flex: 1; }
.nav-item.active { opacity: 1; }
.nav-item svg { width: 28px; height: 28px; }

/* Home Header */
.top-section { text-align: center; margin-bottom: 30px; }
.modern-train-icon { width: 64px; height: 64px; margin-bottom: 10px; }
h1 { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; }
.center-section { width: 100%; padding: 0 32px; display: flex; flex-direction: column; gap: 12px; }
.btn-large { width: 100%; padding: 20px; font-size: 0.8rem; font-weight: 700; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg); text-transform: uppercase; text-align: center; cursor: pointer; }

/* QR Code Styling */
.qr-container { margin-top: 20px; display: flex; justify-content: center; width: 100%; }
.qr-card { 
  background: var(--glass-bg); 
  backdrop-filter: var(--glass-blur); 
  -webkit-backdrop-filter: var(--glass-blur); 
  border: 1px solid var(--glass-border); 
  padding: 16px; 
  border-radius: 24px; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 10px; 
  width: 150px; 
}
.qr-image { 
  width: 110px; 
  height: 110px; 
  border-radius: 10px; 
  mix-blend-mode: screen; 
  filter: brightness(1.2); 
}
.qr-text { 
  font-size: 0.6rem; 
  font-weight: 800; 
  letter-spacing: 0.1em; 
  color: rgba(255, 255, 255, 0.5); 
  text-transform: uppercase; 
}

/* Planner UI */
.plan-controls { width: 100%; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
.input-group { background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; backdrop-filter: var(--glass-blur); }
.plan-select { width: 100%; padding: 18px; background: transparent; border: none; color: white; font-size: 1rem; outline: none; appearance: none; }
.plan-select option { background: #1a1a2e; color: white; }
.divider { height: 1px; background: var(--glass-border); margin: 0 16px; }
.swap-btn { position: absolute; right: 35px; top: 50%; transform: translateY(-50%); width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--glass-border); z-index: 10; cursor: pointer; }

/* Trip cards */
.trip-card { background: var(--glass-bg); margin: 6px 20px; border-radius: 20px; border: 1px solid var(--glass-border); overflow: hidden; transition: all 0.2s; }
.trip-card.past-trip { opacity: 0.38; }
.trip-summary { padding: 18px 20px; display: grid; grid-template-columns: 70px 1fr 60px; align-items: center; cursor: pointer; gap: 4px; }
.trip-time { font-family: monospace; font-weight: 800; font-size: 1.2rem; color: var(--accent-yellow); }
.trip-dest { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
.trip-arr { font-family: monospace; font-size: 0.85rem; color: rgba(255,255,255,0.5); text-align: right; }
.trip-details { max-height: 0; padding: 0 20px; opacity: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; background: rgba(0,0,0,0.15); }
.trip-card.expanded .trip-details { max-height: 800px; padding: 16px 20px; opacity: 1; border-top: 1px solid var(--glass-border); }

/* Transfer Badge */
.badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; vertical-align: middle; }
.badge-direct { background: rgba(255,255,255,0.15); color: white; }
.badge-transfer { background: var(--accent-yellow); color: black; }

.line-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

/* Stop list */
.stop-list { display: flex; flex-direction: column; gap: 0; }
.stop-row { display: flex; align-items: center; gap: 12px; padding: 7px 0; font-size: 0.82rem; font-family: monospace; border-left: 2px solid rgba(255,255,255,0.12); padding-left: 14px; position: relative; }
.stop-row::before { content: ''; position: absolute; left: -5px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: #1a0a28; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 2; }
.stop-row.stop-from::before, .stop-row.stop-to::before { width: 11px; height: 11px; left: -6px; border-color: var(--accent-yellow); background: #1a0a28; }
.stop-time { color: var(--accent-yellow); font-weight: bold; min-width: 44px; }
.stop-name { color: white; font-size: 0.75rem; text-transform: uppercase; }

.transfer-info { padding: 10px; margin: 10px 0; background: rgba(255,215,0,0.1); border-radius: 10px; border: 1px dashed var(--accent-yellow); font-size: 0.75rem; text-align: center; }
</style>
</head>
<body>

<div id="home-page" class="page active">
  <header class="top-section">
    <svg class="modern-train-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <rect x="5" y="2" width="14" height="16" rx="3"/><line x1="5" y1="12" x2="19" y2="12"/>
      <circle cx="9" cy="15" r="1" fill="white"/><circle cx="15" cy="15" r="1" fill="white"/>
    </svg>
    <h1>BG:VOZ</h1>
  </header>
  <main class="center-section">
    <div class="btn-large" onclick="goTo('monitor')">STANIČNI RED VOŽNJE</div>
    <div class="btn-large" onclick="goTo('plan')">PLANIRAJ PUTOVANJE</div>
    
    <div class="qr-container">
      <div class="qr-card">
        <img src="qr-code.png" alt="PWA" class="qr-image">
        <p class="qr-text">mikimisha93</p>
      </div>
    </div>
  </main>
</div>

<div id="monitor-page" class="page">
  <div class="plan-controls">
    <div class="input-group">
      <select id="stationPicker" class="plan-select" onchange="updatePIDS(this.value)">
        <option value="" disabled selected>Izaberi stanicu</option>
      </select>
    </div>
  </div>
  <div id="pidsDisplay" style="display:none; width: 100%; padding: 0 20px; margin-top:15px;">
    <div class="pids-board">
      <div class="pids-header">
        <div class="col-vnum">VOZ</div>
        <div class="col-dir">SMER</div>
        <div class="col-time">VREME</div>
      </div>
      <div id="pidsBody"></div>
    </div>
  </div>
</div>

<div id="plan-page" class="page">
  <div id="stationPickers" style="width:100%;">
    <div class="plan-controls">
      <div class="input-group" style="position:relative;">
        <select id="fromPicker" class="plan-select" onchange="runPlanner()">
          <option value="" disabled selected hidden>Polazak</option>
        </select>
        <div class="divider"></div>
        <select id="toPicker" class="plan-select" onchange="runPlanner()">
          <option value="" disabled selected hidden>Dolazak</option>
        </select>
        <button class="swap-btn" onclick="swapStations()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M7 16V4M7 4L3 8M7 4L11 8M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div id="plannerResults" style="width: 100%; margin-top: 5px;"></div>
</div>

<nav class="nav-bar">
  <div class="nav-item active" id="nav-home" onclick="goTo('home')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10,20V14H14V20H19V12H22L12,3L2,12H5V20H10Z"/></svg>
  </div>
  <div class="nav-item" id="nav-monitor" onclick="goTo('monitor')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
  </div>
  <div class="nav-item" id="nav-plan" onclick="goTo('plan')">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12,2C15.31,2 18,4.66 18,7.95C18,12.41 12,19 12,19C12,19 6,12.41 6,7.95C6,4.66 8.69,2 12,2M12,6A2,2 0 0,0 10,8A2,2 0 0,0 12,10A2,2 0 0,0 14,8A2,2 0 0,0 12,6Z"/></svg>
  </div>
</nav>

<script>
let trainData = [];
const stationMap = {
  'batajnica': 'Batajnica', 'kamendin': 'Kamendin', 'zemun_polje': 'Zemun Polje',
  'altina': 'Altina', 'zemun': 'Zemun', 'tosin_bunar': 'Tosin Bunar',
  'novi_beograd': 'Novi Beograd', 'beograd_centar': 'Beograd Centar',
  'karadjordjev_park': 'Karadjordjev Park', 'vukov_spomenik': 'Vukov Spomenik',
  'pancevacki_most': 'Pancevacki Most', 'krnjaca_most': 'Krnjaca Most',
  'krnjaca': 'Krnjaca', 'sebes': 'Sebes', 'ovca': 'Ovca',
  'resnik': 'Resnik', 'kijevo': 'Kijevo', 'knezevac': 'Knezevac', 'rakovica': 'Rakovica'
};
const stationSlug = {};
Object.entries(stationMap).forEach(([k,v]) => { stationSlug[v] = k; });

const hubs = ['Beograd Centar', 'Karadjordjev Park', 'Vukov Spomenik', 'Pancevacki Most'];

function normalize(name) {
  if (!name) return "";
  return name.replace(/ \(Arr\)| \(Dep\)/g, '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "dj").trim().toLowerCase();
}

async function loadTrainData() {
  try {
    const response = await fetch('trains.json');
    trainData = await response.json();
    populatePickers();
  } catch (e) { console.error("Error loading JSON", e); }
}

function populatePickers() {
  const sorted = Object.values(stationMap).sort();
  const html = `<option value="" disabled selected hidden>Izaberi stanicu...</option>` + 
               sorted.map(s => `<option value="${stationSlug[s]}">${s}</option>`).join('');
  document.getElementById('stationPicker').innerHTML = html;
  document.getElementById('fromPicker').innerHTML = html;
  document.getElementById('toPicker').innerHTML = html;
}

const getTimeNow = () => { const now = new Date(); return now.getHours() * 60 + now.getMinutes(); };
const timeToMin = (t) => { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; };
const getLineColor = (l) => l?.includes('1') ? 'var(--accent-blue)' : (l?.includes('2') ? 'var(--accent-orange)' : 'var(--accent-red)');

function updatePIDS(stationId) {
  const target = normalize(stationMap[stationId]);
  const nowMin = getTimeNow();
  let directions = {};
  trainData.forEach(train => {
    const stop = train.stops.find(s => normalize(s.station) === target);
    if (stop) {
      const depMin = timeToMin(stop.departure);
      const score = depMin < nowMin ? depMin + 1440 : depMin;
      if (!directions[train.direction] || score < directions[train.direction].score) {
        directions[train.direction] = { v: train.train_id, d: train.direction, t: stop.departure, score };
      }
    }
  });
  const results = Object.values(directions).sort((a, b) => a.score - b.score);
  document.getElementById('pidsDisplay').style.display = 'block';
  document.getElementById('pidsBody').innerHTML = (results.length > 0 ? results.map(dep => `
    <div class="pids-row">
      <div class="col-vnum">${dep.v}</div>
      <div class="col-dir">${dep.d.toUpperCase()}</div>
      <div class="col-time">${dep.t.replace(':', '<span class="blink">:</span>')}</div>
    </div>`).join('') : '<div style="padding:20px; text-align:center; opacity:0.5;">Nema polazaka</div>');
}

function runPlanner() {
  const fromId = document.getElementById('fromPicker').value;
  const toId = document.getElementById('toPicker').value;
  if (!fromId || !toId || fromId === toId) return;

  const targetFrom = normalize(stationMap[fromId]);
  const targetTo = normalize(stationMap[toId]);
  const nowMin = getTimeNow();
  
  let directResults = [];
  let transferResults = [];

  trainData.forEach(train => {
    const sIdx = train.stops.findIndex(s => normalize(s.station) === targetFrom);
    const eIdx = train.stops.findIndex(s => normalize(s.station) === targetTo);
    if (sIdx !== -1 && eIdx !== -1 && sIdx < eIdx) {
      directResults.push({
        type: 'direct', train, depTime: train.stops[sIdx].departure, arrTime: train.stops[eIdx].departure,
        stops: train.stops.slice(sIdx, eIdx + 1), depMin: timeToMin(train.stops[sIdx].departure)
      });
    }
  });

  hubs.forEach(hubName => {
    const targetHub = normalize(hubName);
    if (targetHub === targetFrom || targetHub === targetTo) return;
    const leg1s = trainData.filter(t => {
      const s = t.stops.findIndex(st => normalize(st.station) === targetFrom);
      const h = t.stops.findIndex(st => normalize(st.station) === targetHub);
      return s !== -1 && h !== -1 && s < h;
    });
    const leg2s = trainData.filter(t => {
      const h = t.stops.findIndex(st => normalize(st.station) === targetHub);
      const e = t.stops.findIndex(st => normalize(st.station) === targetTo);
      return h !== -1 && e !== -1 && h < e;
    });

    leg1s.forEach(t1 => {
      const depTime = t1.stops.find(st => normalize(st.station) === targetFrom).departure;
      const depMin = timeToMin(depTime);
      const t1ArrMin = timeToMin(t1.stops.find(st => normalize(st.station) === targetHub).departure);

      leg2s.forEach(t2 => {
        const t2DepMin = timeToMin(t2.stops.find(st => normalize(st.station) === targetHub).departure);
        const t2ArrTime = t2.stops.find(st => normalize(st.station) === targetTo).departure;
        const layover = t2DepMin - t1ArrMin;

        if (layover >= 5 && layover <= 45) {
          if (!directResults.some(d => d.depMin === depMin)) {
            transferResults.push({
              type: 'transfer', hub: hubName, leg1: t1, leg2: t2, depTime, arrTime: t2ArrTime, depMin, layover,
              stops1: t1.stops.slice(t1.stops.findIndex(s => normalize(s.station) === targetFrom), t1.stops.findIndex(s => normalize(s.station) === targetHub) + 1),
              stops2: t2.stops.slice(t2.stops.findIndex(s => normalize(s.station) === targetHub), t2.stops.findIndex(s => normalize(s.station) === targetTo) + 1)
            });
          }
        }
      });
    });
  });

  let allResults = [...directResults, ...transferResults].sort((a, b) => a.depMin - b.depMin);
  renderPlanner(allResults, nowMin);
}

function renderPlanner(trips, nowMin) {
  const container = document.getElementById('plannerResults');
  if (trips.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">Nema pronađenih ruta.</div>'; return; }
  
  container.innerHTML = trips.map((trip, idx) => {
    const isPast = trip.depMin < nowMin;
    if (trip.type === 'direct') {
      const stopsHtml = trip.stops.map((s, si) => `<div class="stop-row ${si===0?'stop-from':(si===trip.stops.length-1?'stop-to':'')}"><span class="stop-time">${s.departure}</span><span class="stop-name">${s.station}</span></div>`).join('');
      return `<div class="trip-card ${isPast?'past-trip':''}" onclick="expandTrip(${idx})">
        <div class="trip-summary" id="trip-${idx}">
          <div class="trip-time">${trip.depTime}</div>
          <div class="trip-dest"><span class="line-dot" style="background:${getLineColor(trip.train.line)}"></span>${trip.train.train_id}<span class="badge badge-direct">DIREKTAN</span></div>
          <div class="trip-arr">${trip.arrTime}</div>
        </div>
        <div class="trip-details"><div class="stop-list">${stopsHtml}</div></div>
      </div>`;
    } else {
      const s1 = trip.stops1.map((s, si) => `<div class="stop-row ${si===0?'stop-from':''}"><span class="stop-time">${s.departure}</span><span class="stop-name">${s.station}</span></div>`).join('');
      const s2 = trip.stops2.map((s, si) => `<div class="stop-row ${si===trip.stops2.length-1?'stop-to':''}"><span class="stop-time">${s.departure}</span><span class="stop-name">${s.station}</span></div>`).join('');
      return `<div class="trip-card ${isPast?'past-trip':''}" onclick="expandTrip(${idx})">
        <div class="trip-summary" id="trip-${idx}">
          <div class="trip-time">${trip.depTime}</div>
          <div class="trip-dest"><span class="line-dot" style="background:white"></span>Mixed<span class="badge badge-transfer">PRESEDANJE</span></div>
          <div class="trip-arr">${trip.arrTime}</div>
        </div>
        <div class="trip-details">
          <div class="stop-list">${s1}</div>
          <div class="transfer-info">Izmena: <b>${trip.hub}</b> (Pauza ${trip.layover} min)</div>
          <div class="stop-list">${s2}</div>
        </div>
      </div>`;
    }
  }).join('');
}

function expandTrip(idx) {
  const el = document.getElementById('trip-' + idx).parentElement;
  const isExp = el.classList.contains('expanded');
  document.querySelectorAll('.trip-card').forEach(c => c.classList.remove('expanded'));
  if (!isExp) el.classList.add('expanded');
}

function goTo(screen) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(screen + '-page').classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + screen).classList.add('active');
}

function swapStations() {
  const f = document.getElementById('fromPicker'), t = document.getElementById('toPicker');
  const v = f.value; f.value = t.value; t.value = v; runPlanner();
}

document.addEventListener('DOMContentLoaded', loadTrainData);
</script>
</body>
</html>
