name: Update Train Data

on:
  schedule:
    # Runs at 04:00 AM UTC (approx. 06:00 AM Belgrade time)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows manual run button in Actions tab

permissions:
  contents: write # CRITICAL: Allows the action to save trains.json to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4 for Node.js 24 compatibility

      - name: Set up Python
        uses: actions/setup-python@v5  # Updated to v5 for Node.js 24 compatibility
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trains.json
          # The "exit 0" prevents the action from failing if there are no changes
          git commit -m "Auto-update train data: $(date)" || exit 0
          git push
